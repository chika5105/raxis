# RAXIS canonical Reviewer image inputs.
#
# Normative reference: planner-harness.md §10.4 + §14.4.
# Consumed by `cargo run -p raxis-image-builder -- build reviewer`.
#
# This image is kernel-canonical (INV-PLANNER-HARNESS-02): the kernel
# binary version-locks against `EXPECTED_REVIEWER_IMAGE_DIGEST`,
# operators MUST NOT supply a substitute. The build pipeline reads
# this file, walks `rootfs/`, and produces a signed `ImageManifest`
# bound to the kernel signing key (system-requirements.md §11.2).

role              = "Reviewer"
kernel_version    = "0.2.1"

# Reproducibility pin. Bumped once per kernel release; carried in the
# `build_env` of the produced manifest.
source_date_epoch = 1700000000

# Tooling versions the builder shells out to. The CI determinism gate
# fails if these drift; reproducibility depends on byte-for-byte
# version pinning of mkfs.erofs / tar / zstd.
erofs_version     = "1.7.1"
tar_version       = "1.34"
zstd_version      = "1.5.5"
