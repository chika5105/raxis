# RAXIS canonical Orchestrator image inputs.
#
# Normative reference: planner-harness.md §10.5 + §14.4.
# Consumed by `cargo run -p raxis-image-builder -- build orchestrator`.
#
# This image is kernel-canonical (INV-PLANNER-HARNESS-05): the kernel
# binary version-locks against `EXPECTED_ORCHESTRATOR_IMAGE_DIGEST`,
# operators MUST NOT supply a substitute. The build pipeline reads
# this file, walks `rootfs/`, and produces a signed `ImageManifest`.
#
# The Orchestrator's NNSP (`ORCHESTRATOR_NNSP_BYTES`) is compiled
# into the kernel binary directly, not embedded into this image.

role              = "Orchestrator"
kernel_version    = "0.1.0"

source_date_epoch = 1700000000
erofs_version     = "1.7.1"
tar_version       = "1.34"
zstd_version      = "1.5.5"

# `image_format` selects the on-disk shape of the rootfs blob this
# build emits. Defaults to `RootfsErofs` (production canonical) when
# absent; `cargo xtask images bake` overrides this to
# `RootfsInitramfsCpio` for the macOS-hermetic dev pipeline regardless
# of what's written here. Operators running the production EROFS path
# leave this at `RootfsErofs` (or omit it entirely).
image_format      = "RootfsErofs"
