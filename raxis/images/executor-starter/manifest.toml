# RAXIS canonical Executor starter image inputs.
#
# Normative reference: planner-harness.md §10.6 + §14.4.
# Consumed by `cargo run -p raxis-image-builder -- build executor-starter`.
#
# This image is the **opt-in** Executor starter: operator-elected via
# `policy.toml [default_executor_image]`, NOT structurally mandatory.
# Operators in production typically pin their own digest-pinned
# Executor image; this starter is the new-operator-onboarding default
# (`operator-ergonomics.md §3 D1`).
#
# The kernel does NOT version-lock against this image's digest at the
# binary level — the digest is operator-pinned via the policy bundle's
# `[[vm_images]]` entry. The signed manifest produced here is what the
# operator policy-pins.

role              = "ExecutorStarter"
kernel_version    = "0.2.3"

source_date_epoch = 1700000000
erofs_version     = "1.7.1"
tar_version       = "1.34"
zstd_version      = "1.5.5"

# Pre-baked lint toolchain pins
# (`INV-EXECUTOR-IMAGE-LINT-TOOLCHAIN-PYTHON-01`,
# `INV-EXECUTOR-IMAGE-LINT-TOOLCHAIN-JS-01`).
#
# These are documentary fields — the kernel does not consume them
# at boot. They exist so an operator auditing the manifest can
# answer "which ruff / eslint / prettier / tsc version is in this
# bake?" without re-running the rootfs through `dpkg-query` /
# `pip show` / `npm ls -g`. The Containerfile is the source of
# truth; `verify.sh` cross-checks the bake against the values
# below by asserting the matching `.dist-info` dirs (Python) and
# `node_modules/<pkg>` trees (JS) exist in the rootfs.
[lint_toolchain]
ruff_version = "0.7.4"
eslint_version = "9.15.0"
prettier_version = "3.3.3"
typescript_version = "5.6.3"
tsx_version = "4.19.2"
typescript_eslint_parser_version = "8.15.0"
rust_toolchain = "debian-bookworm-apt"
rust_packages = ["rustc", "cargo", "rustfmt", "rust-clippy"]
