# RAXIS canonical Executor starter image inputs.
#
# Normative reference: planner-harness.md §10.6 + §14.4.
# Consumed by `cargo run -p raxis-image-builder -- build executor-starter`.
#
# This image is the **opt-in** Executor starter: operator-elected via
# `policy.toml [default_executor_image]`, NOT structurally mandatory.
# Operators in production typically pin their own digest-pinned
# Executor image; this starter is the new-operator-onboarding default
# (`operator-ergonomics.md §3 D1`).
#
# The kernel does NOT version-lock against this image's digest at the
# binary level — the digest is operator-pinned via the policy bundle's
# `[[vm_images]]` entry. The signed manifest produced here is what the
# operator policy-pins.

role              = "ExecutorStarter"
kernel_version    = "0.1.0"

source_date_epoch = 1700000000
erofs_version     = "1.7.1"
tar_version       = "1.34"
zstd_version      = "1.5.5"
