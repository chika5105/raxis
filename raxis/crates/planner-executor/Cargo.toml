[package]
name        = "raxis-planner-executor"
version     = { workspace = true }
edition     = { workspace = true }
license     = { workspace = true }
authors     = { workspace = true }
repository  = { workspace = true }
description = "RAXIS V2 — guest-side planner-harness binary for the Executor role. Installed at `/usr/local/bin/raxis-executor` inside the canonical executor-starter image; the kernel session-spawn path stamps this exact path into the VM's entrypoint_argv. Currently a minimum-bootable scaffold per `planner-harness.md §14.1`."

[[bin]]
name = "raxis-executor"
path = "src/main.rs"

[dependencies]
# Same `vsock-transport` rationale as `planner-orchestrator/Cargo.toml`.
raxis-planner-core = { path = "../planner-core", features = ["executor", "vsock-transport"] }
tokio              = { workspace = true }
# In-VM credential-proxy reachability (INV-CRED-PROXY-VM-REACHABILITY-01).
#
# The substrate-loopback fix landed by `8a26540` registers the host-side
# vsock listener that splices to the credential-proxy host loopback ports
# AND stamps `RAXIS_VSOCK_LOOPBACK_PLAN` into `vm_spec.env`. The matching
# in-guest TCP→AF_VSOCK fan-out lives in `raxis_tproxy::loopback_forwarder`.
#
# Default-off path: `raxis-tproxy` is consumed as a library here so
# the credential-proxy vsock-loopback fan-out runs inside the
# executor binary without a separate process. Path A3
# (`RAXIS_AIRGAP_A3=1` + `runtime-airgap-a3` cargo feature on the
# kernel side) additionally drives the in-guest tproxy accept loop
# (`raxis_tproxy::linux::accept_loop_a3`) and the DNS stub
# (`raxis_tproxy::dns_stub::run_dns_stub`) from this binary —
# `images/executor-starter/Containerfile` still ships only one
# binary on the canonical executor rootfs, the egress chokepoint
# is statically linked into it.
#
# See `specs/v2/airgap-architecture.md §6` for the feature-gate
# rationale.
raxis-tproxy      = { workspace = true }
