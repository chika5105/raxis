[package]
name        = "raxis-test-support"
version.workspace     = true
edition.workspace     = true
license.workspace     = true
authors.workspace     = true
repository.workspace  = true

# Test-only crate. Other crates depend on it ONLY via [dev-dependencies].
# Production-graph dependency would mean shipping FakeClock etc. in a
# release binary, which is a bug.
publish     = false
description = "RAXIS workspace-wide test helpers (FakeClock, in-memory store, audit sink re-exports)."

[dependencies]
raxis-types             = { workspace = true }
raxis-store             = { workspace = true }
raxis-audit-tools       = { workspace = true }
raxis-crypto            = { workspace = true }
# `raxis-gateway-substrate` carries the `Backend` trait that
# `gateway_backend::MockBackend` implements. Pulling in just the
# trait crate (rather than the whole `raxis-gateway` crate) keeps
# the build graph acyclic: `raxis-gateway` itself dev-deps on
# `raxis-test-support` for cert helpers, so a transitive
# `raxis-test-support → raxis-gateway → (dev) raxis-test-support`
# loop would cause cargo to compile two copies of `raxis-gateway`
# (one for prod, one as a test-support dep) and the resulting
# `Backend` impls wouldn't satisfy each other at the trait level.
# Same separation principle as the FakeClock pattern
# (`philosophy.md` §1.6).
raxis-gateway-substrate = { workspace = true }
ed25519-dalek           = { workspace = true }
thiserror               = { workspace = true }

# Temp-dir lifecycle for the GitRepo / AuditDir / DiskStore fixtures.
# `tempfile` is already a dev-dep of `raxis-kernel`; we re-pin the same
# version family here so the fixtures can hand out auto-cleaning
# `TempDir`-backed artifacts.
tempfile          = "3"

# AuditDir builds production-shape genesis records (matching what
# `kernel::bootstrap::write_genesis_audit_record` emits) and exposes
# the SHA-256 of the resulting line so the next post-genesis record
# can chain off it. Both crates are tiny and already in the workspace.
sha2              = { workspace = true }
hex               = { workspace = true }
serde_json        = { workspace = true }

[dev-dependencies]
# Used by the Layer 2 workspace-guard test (`src/workspace_guard.rs`)
# to parse every member's Cargo.toml and assert raxis-test-support
# only appears under [dev-dependencies].
toml              = { workspace = true }
# `gateway_backend::tests` use `#[tokio::test]` to drive the async
# `Backend::call` surface. Dev-dep only — production code never needs
# a runtime here (the `MockBackend` itself is sync-friendly because
# `Box::pin(async move { ... })` doesn't require a runtime to construct).
tokio             = { workspace = true }
