[package]
name        = "raxis-isolation-apple-vz"
version.workspace     = true
edition.workspace     = true
license.workspace     = true
authors.workspace     = true
repository.workspace  = true

# raxis-isolation-apple-vz ŌĆö concrete `Backend` impl for macOS using
# Apple's Virtualization.framework (AVF).
#
# Normative reference:
#   * `specs/v2/extensibility-traits.md ┬¦3.5` (Reference impl table; this is
#     the `AppleVirtualizationIsolation` row, default on macOS, R1Conformant).
#   * `specs/v2/system-requirements.md ┬¦5.2` (AVF admission rules).
#   * `specs/v2/v2-deep-spec.md ┬¦Step 10` (VirtioFS + VSock plumbing ŌĆö AVF's
#     `VZVirtioFileSystemDeviceConfiguration` + `VZVirtioSocketDeviceConfiguration`
#     are the macOS counterparts of Firecracker's virtio devices).
#
# Crate scope:
#   * `AppleVzBackend`               ŌĆö `raxis_isolation::Backend` factory.
#   * `AppleVzSession`               ŌĆö `raxis_isolation::Session` live handle.
#   * `config::VmConfigBuilder`      ŌĆö pure-data typed translator from
#                                      `raxis_isolation::VmSpec` into the
#                                      AVF configuration objects we hand
#                                      to `VZVirtualMachineConfiguration`.
#   * `runtime::AvfRuntime`          ŌĆö macOS-only dispatch wrapper around
#                                      `VZVirtualMachine::start` /
#                                      `stop`. Compiles to a stub on
#                                      non-macOS targets so the trait
#                                      surface is single-target across
#                                      the workspace.
#
# Crate scope explicitly EXCLUDES:
#   * Mock substrate. Test fakes live in `raxis-test-support` per the
#     workspace's mock-isolation discipline.
#   * Kernel-side host-detection fan-out ŌĆö picking AVF vs Firecracker at
#     boot is the kernel's job.
#
# Why a dedicated crate (and not part of `raxis-kernel`):
#   * Same reason as `raxis-isolation-firecracker`: the kernel is
#     compiled against the trait, substrates are independent crates.

[dependencies]
raxis-isolation       = { workspace = true }
raxis-types           = { workspace = true }
raxis-vsock-loopback  = { workspace = true }
serde                 = { workspace = true }
serde_json            = { workspace = true }
thiserror             = { workspace = true }
# `base64` for the `raxis.envb64=` cmdline propagation envelope.
# Single-purpose, no_std-friendly; pinned through the workspace
# manifest so the substrate's link surface stays under tight
# control.
base64          = { workspace = true }
# `libc` for `pipe(2)` + `read(2)` + `close(2)` in the AVF console
# pump path. Apple's `Virtualization.framework` only writes
# guest-console output to file handles backed by a pipe (regular
# files are silently dropped on macOS 15.x), so the substrate
# allocates an anonymous pipe per VM and drains it on a host
# thread.
libc            = { workspace = true }

# `objc2-virtualization` is the macOS-only binding to
# Virtualization.framework. Linked only on macOS targets so the
# crate compiles cleanly on Linux (where the library is meaningless).
#
# Feature footprint (everything the iso-3 + iso-3-followup arc
# touches): boot loader, virtual-machine configuration & runtime,
# block / VirtioFS / network / VSock device classes, and the
# completion-handler bridges (`block2`, `dispatch2`). Nothing more
# ŌĆö keeps the link surface tight so the substrate fails fast at the
# AVF seam rather than at link time.
[target.'cfg(target_os = "macos")'.dependencies]
objc2                    = "0.6"
objc2-foundation         = { version = "0.3", features = ["NSURL", "NSError", "NSString"] }
block2                   = "0.6"
dispatch2                = { version = "0.3", features = ["objc2"] }
objc2-virtualization     = { version = "0.3", features = [
    # Boot loader
    "VZBootLoader",
    "VZLinuxBootLoader",
    # VM configuration + runtime
    "VZVirtualMachineConfiguration",
    "VZVirtualMachine",
    "VZVirtualMachineDelegate",
    # Storage (rootfs)
    "VZStorageDeviceConfiguration",
    "VZStorageDeviceAttachment",
    "VZVirtioBlockDeviceConfiguration",
    "VZDiskImageStorageDeviceAttachment",
    # Directory sharing (VirtioFS)
    "VZDirectorySharingDeviceConfiguration",
    "VZVirtioFileSystemDeviceConfiguration",
    "VZDirectoryShare",
    "VZSingleDirectoryShare",
    "VZSharedDirectory",
    # Network (Tier1Tproxy NAT)
    "VZNetworkDeviceConfiguration",
    "VZVirtioNetworkDeviceConfiguration",
    "VZNetworkDeviceAttachment",
    "VZNATNetworkDeviceAttachment",
    "VZMACAddress",
    # VSock (control plane)
    "VZSocketDeviceConfiguration",
    "VZVirtioSocketDeviceConfiguration",
    "VZSocketDevice",
    "VZVirtioSocketDevice",
    "VZVirtioSocketConnection",
    # VSock-loopback bridge ŌĆö `VZVirtioSocketListener` accepts
    # guest-initiated AF_VSOCK connections on the per-VM device
    # so host-side credential proxies are reachable from inside
    # the agent VM via stock `127.0.0.1:<guest_loopback_port>`
    # URLs (INV-CRED-PROXY-VM-REACHABILITY-01).
    "VZVirtioSocketListener",
    # Serial console (guest stdout / stderr capture for the
    # `VmSpec::guest_console_log` path ŌĆö `VZFileHandleSerialPortAttachment`
    # writes the guest's `console=hvc0` output into a host-side file
    # handle so panics from PID 1 leave a forensic trail instead of
    # surfacing as an opaque vsock RST).
    "VZSerialPortConfiguration",
    "VZSerialPortAttachment",
    "VZVirtioConsoleDeviceSerialPortConfiguration",
    "VZFileHandleSerialPortAttachment",
    # Async-start completion-handler bridging
    "block2",
    "dispatch2",
] }

[dev-dependencies]
tempfile = "3"
