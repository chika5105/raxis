[package]
name        = "raxis-planner-orchestrator"
version     = { workspace = true }
edition     = { workspace = true }
license     = { workspace = true }
authors     = { workspace = true }
repository  = { workspace = true }
description = "RAXIS V2 — guest-side planner-harness binary for the Orchestrator role. Installed at `/usr/local/bin/raxis-orchestrator` inside the canonical orchestrator image; the kernel session-spawn path stamps this exact path into the VM's entrypoint_argv. Currently a minimum-bootable scaffold per `planner-harness.md §14.1`."

[[bin]]
name = "raxis-orchestrator"
path = "src/main.rs"

[dependencies]
# `vsock-transport` is enabled here so a binary built for the canonical
# orchestrator-core image (cross-compiled to Linux musl by
# `cargo xtask images bake --role orchestrator`) speaks AF_VSOCK
# to the kernel host as required by `planner-harness.md §14.5`.
# Builds on macOS / Windows still link successfully because the inner
# `tokio-vsock` dep is itself feature-gated to Linux at the upstream
# crate level — non-Linux builds simply omit the dependency, and the
# planner-core `connect()` falls back to `TransportError::VsockUnavailable`.
raxis-planner-core = { path = "../planner-core", features = ["orchestrator", "vsock-transport"] }
tokio              = { workspace = true }
