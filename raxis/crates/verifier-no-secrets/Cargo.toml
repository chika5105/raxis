[package]
name        = "raxis-verifier-no-secrets"
version.workspace     = true
edition.workspace     = true
license.workspace     = true
authors.workspace     = true
repository.workspace  = true

# Real, fast worktree-scanning verifier (iter62 / iter63).
#
# Why this crate exists
# ─────────────────────
# Iter63 introduced a paired-write at the gate-recheck-clear edge in
# `kernel/src/scheduler/dag.rs::transition_to_admitted` (landed by
# the deep-sweep pass). That paired-write only fires when the
# kernel's gate-evaluation pipeline crosses
# `GatesPending → Admitted` after a `Pass` witness lands — which in
# turn requires at least one real `[[gates]]` entry in the loaded
# policy AND a matching verifier subprocess that the kernel can spawn,
# run to completion, and observe a witness from. Without a verifier
# wired into the live-e2e bootstrap, the recheck-clear edge is never
# reached and the new audit row is never emitted in production runs.
#
# This crate provides ONE such mechanical check: it scans the executor
# worktree for known credential / secret prefixes (AWS access keys,
# GitHub PATs, Anthropic API keys, Slack bot tokens), emits a JSON
# summary/artifact, and exits 0 for clean or 1 for found secrets. The
# canonical `raxis-verifier` shim turns that exit status into the
# kernel witness. Crucially:
#
#   - The check is a real correctness property (a leaked secret IS a
#     security defect), not a tautology.
#   - The check is fast: it walks the worktree once with hard caps on
#     file count + per-file byte budget, so even pathological seeds
#     finish well under one second.
#   - The check is deterministic and offline: no network, no clock
#     dependency, no external binaries.
#   - The check is high-signal for iter63: the live-e2e seeds
#     (`rich-multilang-001`, `out/postgres/*.json`, etc.) contain no
#     real credentials, so the witness lands `Pass` deterministically
#     and the gate-recheck-clear edge fires every iter.
#
# Crate split mirrors `raxis-verifier-stub`:
#   - `lib.rs` — env parser, scanner, exit-code mapper, and report
#     writer. Pure functions (except scanner/artifact I/O); unit-tested
#     in isolation without spawning a subprocess.
#   - `main.rs` — the binary entry point. Reads the mechanical spawn
#     envelope, drives the scanner, writes the optional artifact, prints
#     a JSON summary, and exits. It never opens a kernel socket.
#
# Spawn-envelope contract
# ───────────────────────
# Honours the production spawn envelope set by
# `kernel/src/gates/verifier_runner.rs::spawn_verifier`:
#
#   RAXIS_WORKTREE_ROOT      ← directory we scan
#   RAXIS_VERIFIER_ARTIFACT_PATH ← optional JSON report path
#
# This crate is INTENDED for production use as a kernel-bundled
# verifier — unlike `raxis-verifier-stub` (which is `publish = false`
# and test-only), this one is shipped.
description = "Fast, real worktree-scanning mechanical check for secret-shaped strings."

[lib]
path = "src/lib.rs"

[[bin]]
name = "raxis-verifier-no-secrets"
path = "src/main.rs"

[dependencies]
# Structured summary/artifact listing which secret pattern matched (if any)
# so operators reading audit have actionable forensics.
serde_json  = { workspace = true }

# Typed error variants so test assertions can `matches!(...)` rather
# than grepping into stringified errors.
thiserror   = { workspace = true }

[dev-dependencies]
# Build a fixture worktree on disk for the lib unit tests.
tempfile    = "3"
