[package]
name        = "raxis-tproxy-protocol"
version.workspace = true
edition.workspace = true
license.workspace = true
description = """
Wire-protocol crate for the V2 Tier 1 transparent egress proxy
(`raxis-tproxy`). Pure types — no I/O — so the in-VM `raxis-tproxy`
binary, the kernel-side admission service, and integration tests
all share one definition of `ProxyAdmissionRequest` /
`ProxyAdmissionResponse` and the SNI / Host header parsers.
"""

[lib]
name = "raxis_tproxy_protocol"
path = "src/lib.rs"

[dependencies]
serde     = { workspace = true }
bincode   = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
hex = { workspace = true }
