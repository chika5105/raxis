[package]
name        = "raxis-policy"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
serde       = { workspace = true }
serde_json  = { workspace = true }
toml        = { workspace = true }
sha2        = { workspace = true }
hex         = { workspace = true }
thiserror   = { workspace = true }
raxis-types  = { workspace = true }
# Cert structural / self-signature validation lives in raxis-crypto; the
# policy bundle calls into it during PolicyBundle::validate. Keeping the
# crypto code centralised means the kernel and CLI ALWAYS validate certs
# the same way (no parallel implementations).
raxis-crypto = { workspace = true }
# `CredentialBackendKind` enum (file / vault / aws_secrets_manager /
# azure_key_vault / pkcs11) parsed from `policy.toml [credential_backend]`.
# Trait-only crate; pulls in `secrecy` + `zeroize` for `CredentialValue`
# but no I/O — appropriate to depend on from `raxis-policy` which is
# itself I/O-light.
raxis-credentials = { workspace = true }

[dev-dependencies]
tempfile          = "3"
raxis-audit-tools = { workspace = true }
# Cert validation tests need to mint freshly-signed certs via raxis-crypto's
# `sign_cert`, which takes an `ed25519_dalek::SigningKey`. This dep is
# tests-only — runtime cert verification only needs the public-key path
# which raxis-crypto already exposes.
ed25519-dalek     = { workspace = true }
# Cert-mandatory test fixtures use `test_support::cert::ephemeral_cert*`
# so every test that constructs an `OperatorEntry` mints a structurally
# valid, self-signed cert without hand-rolling the ceremony at every
# call site. dev-dep only by Layer-1/2/3 enforcement
# (raxis-test-support/lib.rs) — never appears in production deps.
raxis-test-support = { path = "../test-support" }
