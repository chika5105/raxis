[package]
name        = "raxis-session-spawn"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
# Core trait: who actually boots the VM.
raxis-isolation         = { path = "../isolation" }

# Per-session credential proxies — the SessionSpawnService binds them
# at session-spawn time, hands the loopback URLs to the substrate via
# VmSpec.env, and tears them down at session-terminate time.
raxis-credential-proxy-manager = { path = "../credential-proxy-manager" }

# Per-session admission decision plane — the kernel-side policy
# enforcement loop the in-guest tproxy substrate talks to over
# loopback (dev) or vsock (V2 GA).
raxis-egress-admission  = { path = "../egress-admission" }

# Plan-level credential declarations (the input the spawn service
# consumes when building a SpawnRequest).
raxis-plan-credentials  = { path = "../plan-credentials" }

# Wire format for the substrate-level vsock-loopback fan-out that
# bridges in-VM `127.0.0.1:<port>` URLs to host-side credential
# proxies. The kernel allocates per-session vsock ports here, stamps
# the env var the in-guest forwarder reads, and registers the
# host-side listeners on the substrate session.
raxis-vsock-loopback    = { workspace = true }

# Shared tooling.
raxis-audit-tools       = { workspace = true }
raxis-credentials       = { workspace = true }

# V3 perf telemetry — optional Hub-Arc setter the kernel calls. The
# crate compiles without an `Arc<ObservabilityHub>` (legacy callers,
# integration tests) and is a no-op when no hub is wired in.
raxis-observability     = { path = "../observability" }

# `INV-KERNEL-STATELESS-VM-CONCURRENCY-CAP-01` (iter65). The
# `active_count` helper consulted by the kernel's VM-concurrency
# cap-admission gate now derives its value from the durable
# `sessions` table rather than from the in-memory live-handle map
# (which leaked entries on the `planner_self_exit` revoke path,
# pinning `current_running` at the cap forever once a few sessions
# leaked). The store handle is optional on `SessionSpawnService`
# so legacy unit-test fixtures that never wire a store keep
# compiling against the earlier in-memory fallback.
raxis-store             = { path = "../store" }

serde       = { workspace = true }
serde_json  = { workspace = true }
tokio       = { workspace = true }
tracing     = "0.1"
thiserror   = { workspace = true }
parking_lot = "0.12"

[dev-dependencies]
raxis-test-support      = { path = "../test-support" }
raxis-credentials-file  = { workspace = true }
raxis-tproxy-protocol   = { path = "../tproxy-protocol" }
# iter65 stateless-cap regression suite (`INV-KERNEL-STATELESS-VM-
# CONCURRENCY-CAP-01`). The `active_count_reads_db_*.rs` tests seed
# `sessions` rows directly via raw SQL to drive the cap-admission
# gate without booting a substrate VM.
rusqlite                = { workspace = true }
tempfile                = "3"
tokio                   = { workspace = true, features = ["full"] }
