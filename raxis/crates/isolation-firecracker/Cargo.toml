[package]
name        = "raxis-isolation-firecracker"
version.workspace     = true
edition.workspace     = true
license.workspace     = true
authors.workspace     = true
repository.workspace  = true

# raxis-isolation-firecracker ã concrete `Backend` impl for Linux + KVM.
#
# Normative reference:
#   * `specs/v2/extensibility-traits.md ôÏ3.5` (Reference impl table; this is
#     the `FirecrackerIsolation` row, default on Linux, R1Conformant).
#   * `specs/v2/system-requirements.md ôÏ5.1` (KVM admission rules).
#   * `specs/v2/v2-deep-spec.md ôÏStep 10` (VirtioFS + VSock plumbing).
#
# Crate scope:
#   * `FirecrackerBackend`           ã `raxis_isolation::Backend` factory.
#   * `FirecrackerSession`           ã `raxis_isolation::Session` live handle.
#   * `api::FirecrackerApi`          ã typed Unix-domain-socket REST client
#                                      against the Firecracker VMM API.
#   * `vmm::FirecrackerVmm`          ã child-process supervision (spawn,
#                                      health, reap).
#   * `vsock::HostVsockListener`     ã host-side `AF_VSOCK` listener that
#                                      multiplexes guest control traffic.
#
# Crate scope explicitly EXCLUDES:
#   * Mock substrate. Test fakes for Firecracker (e.g. an in-process REST
#     server that mimics `firecracker --api-sock`) live in
#     `raxis-test-support` per the workspace's mock-isolation discipline.
#   * Cross-platform runtime detection. Selecting between Firecracker and
#     AVF at boot is the kernel's job (`raxis-kernel/src/main.rs`); this
#     crate compiles on every platform but its `Backend::spawn` returns
#     `IsolationError::BackendInternal` when the host is not Linux+KVM.
#
# Why a dedicated crate (and not part of `raxis-kernel`):
#   * Adheres to the ôÏ3 split: kernel binary is compiled against the
#     `raxis-isolation` trait; a substrate is a separate crate that the
#     kernel boots into via `Arc<dyn Backend>`. Tests use
#     `raxis-test-support::SubprocessIsolation` as a non-VMM substrate;
#     real-isolation integration tests link this crate.

[dependencies]
raxis-isolation = { workspace = true }
raxis-types     = { workspace = true }
base64          = { workspace = true }
serde           = { workspace = true }
serde_json      = { workspace = true }
thiserror       = { workspace = true }
# `tokio` for the host-side credential-proxy vsock-loopback bridge
# (`vsock_loopback_bridge.rs`). The bridge owns a per-session
# reverse-direction UDS listener (`<uds_path>_<vsock_port>`) and
# splices accepted streams to `127.0.0.1:<host_loopback_port>` via
# `tokio::io::copy_bidirectional`. Using tokio (vs. `std::thread`
# like the AVF substrate) avoids paying for one OS thread per
# concurrent credential-proxy connection on Linux hosts that may
# run hundreds of concurrent sessions. The substrate caller is
# always inside the kernel's tokio runtime
# (`raxis-session-spawn::spawn_session` is `async fn`); the bridge
# surfaces `LoopbackBridgeError::NoTokioRuntime` if invoked outside
# one.
tokio           = { workspace = true }

[dev-dependencies]
# `tempfile` is workspace-wide test-only. We re-import directly here so
# the integration tests can stage UDS / kernel image fixtures next to
# the ephemeral `firecracker --api-sock` socket without leaking into
# the parent process's `$TMPDIR`.
tempfile        = "3"
