[package]
name        = "raxis-store"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
# Forward-looking opt-in for a future `raxis-test-support` crate that
# will re-export `reset_lock_sync_from_async_count_for_tests` and
# friends. Today only `cfg(test)` consumers (the in-crate tests under
# `async_runtime_safety`) reach those helpers; declaring the feature
# here keeps the `#[cfg(any(test, feature = "test-support"))]` gates
# in `src/db.rs` honest under `-D warnings` (`unexpected_cfgs` lint)
# without prematurely expanding the public API. See
# `INV-KERNEL-STORE-LOCK-SYNC-NEVER-FROM-ASYNC-01` and
# RETURN_NOTE_TO_PARENT_iter66_async_store_lock_sweep.md ¬ß"Test-only
# helpers" for the spec.
test-support = []

[dependencies]
rusqlite    = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
thiserror   = { workspace = true }
uuid        = { workspace = true }
tokio       = { workspace = true }
# Used by `views::plan_fields` to parse the `[[tasks]]` array out of
# `signed_plan_artifacts.plan_bytes` (TOML) for the read-only CLI's
# `inspect --reveal-paths` surface (cli-readonly.md ¬ß5.4.2 / ¬ß5.5.6).
# Pinned at workspace level alongside the kernel's plan TOML parser.
toml        = { workspace = true }
raxis-types = { workspace = true }
# `views::operator_certificates::repopulate` consumes a `PolicyBundle`
# (the source-of-truth shape, owned by `raxis-policy`) inside the
# write transaction opened by `policy_manager::advance_epoch`.
# Layering rule check: `raxis-policy` does NOT depend on
# `raxis-store`, so this edge is one-way and acyclic.
raxis-policy = { workspace = true }
# iter61 ‚Äî `raxis_store::observability` re-exports the closed
# `query_class` lexicon and the `time_query` helper, both of which
# need a hub handle to record a histogram sample. Layering check:
# `raxis-observability` is a leaf crate (no deps on store / kernel
# / policy), so this edge is one-way and acyclic.
raxis-observability = { workspace = true }

[dev-dependencies]
# Used by `ro::tests` to construct a temporary `data_dir` and the
# kernel.db file inside it. Production code never touches `tempfile`.
tempfile      = "3"
# `views::operator_certificates::tests` needs to mint freshly-signed
# certs via `raxis-crypto::cert::sign_cert` to assert the writer +
# reader round-trip. These deps are tests-only; the production code
# in `repopulate` only writes already-signed bytes from the bundle
# and never re-signs.
raxis-crypto  = { workspace = true }
ed25519-dalek = { workspace = true }
sha2          = { workspace = true }
hex           = { workspace = true }
