[package]
name        = "raxis-ipc"
version.workspace = true
edition.workspace = true
license.workspace = true

# Wire codec: bincode 2.0.1 with `bincode::config::standard()` and the `serde`
# feature, framed with a 4-byte little-endian length prefix per
# specs/v1/peripherals.md §3. Workspace pin justification (including why not
# 3.x) lives in raxis/Cargo.toml [workspace.dependencies].
[dependencies]
bincode     = { workspace = true }
serde       = { workspace = true }
# Used by `json_frame` for the operator socket. Kept distinct from the planner
# socket's bincode codec because operators inspect operator frames by hand
# during ceremonies. See peripherals.md §3 "Operator socket".
serde_json  = { workspace = true }
tokio       = { workspace = true }
thiserror   = { workspace = true }
uuid        = { workspace = true }
raxis-types = { workspace = true }
# iter61 — `INV-OBSERVABILITY-DATAPLANE-LATENCY-05`. The framing
# layer times its four sub-stages (encode / write / read / decode)
# and emits one `raxis.kernel.substrate.ipc.frame.stage.duration`
# histogram sample per stage when a global `ObservabilityHub` is
# wired via `set_global_observability_hub`. Optional handle; the
# crate remains usable without a hub (planner-side fixtures + every
# CLI tool that doesn't boot the full kernel).
raxis-observability = { workspace = true }
