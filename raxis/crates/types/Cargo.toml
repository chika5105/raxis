[package]
name        = "raxis-types"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
serde       = { workspace = true }
serde_json  = { workspace = true }
uuid        = { version = "1", features = ["v4", "serde"] }
thiserror   = { workspace = true }

[dev-dependencies]
# Required for the regression test in `witness::tests` that pins the
# `WitnessSubmission` ↔ bincode round-trip via the canonical kernel
# wire codec (`bincode::config::standard()`). Same pin as the workspace
# wire codec in `raxis-ipc::frame` to keep the test honest.
bincode     = { workspace = true }
# Required for `operator_cert::tests` TOML round-trip pins. The on-disk
# cert shape MUST match across CLI / kernel / future serde upgrades, so
# the test asserts the exact byte output.
toml        = { workspace = true }
