# raxis/observability/prometheus/prometheus.yml
#
# Prometheus scrape configuration for the live-e2e + perf harness.
#
# Spec: specs/v3/observability-prometheus.md
#
# Pinned image: prom/prometheus:v2.55.1
# Retention:    14 days (set via container --storage.tsdb.retention.time
#               flag, NOT here - this file only controls scrape).
# Volume:       prometheus_data (named docker volume; survives
#               `docker compose down`).

global:
  scrape_interval:     5s
  evaluation_interval: 15s
  external_labels:
    cluster: raxis-live-e2e-test

scrape_configs:
  # The OpenTelemetry collector exposes the entire raxis emit surface
  # at this endpoint. Every metric in
  # specs/v3/observability-prometheus.md flows through this one
  # scrape job. Prometheus does NOT scrape the kernel directly;
  # the kernel is OTLP-only per `INV-OTEL-03`.
  - job_name: raxis-otel
    metrics_path: /metrics
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          source: otel-collector

  # The collector's own internal counters - useful for spotting
  # dropped data points, batch-flush latency, exporter failures.
  # `otelcol_exporter_send_failed_metric_points` going up means
  # the Prometheus exporter is unhappy; investigate before
  # trusting numbers.
  - job_name: otel-collector-internal
    metrics_path: /metrics
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          source: otel-collector-self

  # Prometheus self-scrape so operators can confirm scrape health
  # of the scraper itself.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
