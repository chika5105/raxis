# RAXIS plan template — `experiment`
# DAG: setup → run → cleanup
#
# Time-bounded exploratory work that does not produce a merge.  See
# `specs/v2/operator-ergonomics.md §6.3`.

[meta]
version = 1

[plan.initiative]
description = "@@INITIATIVE_NAME@@"

[workspace]
lane_id    = "main"
target_ref = "refs/heads/main"

[[tasks]]
task_id            = "setup"
name               = "Set up experiment environment"
description        = """
Prepare the workspace for @@INITIATIVE_NAME@@: stage any input fixtures,
materialise feature flags, and verify the toolchain version matches what
the experiment expects. Do not run the experiment yet.
"""
session_agent_type = "Executor"
clone_strategy     = "blobless"

[[tasks]]
task_id            = "run"
name               = "Run the experiment"
description        = """
Execute @@INITIATIVE_NAME@@ against the staged environment. Capture
metrics, observable side-effects, and any anomalies to a structured output
the operator can review. Do not modify production code paths.
"""
session_agent_type = "Executor"
predecessors       = ["setup"]

[[tasks]]
task_id            = "cleanup"
name               = "Tear down experiment artefacts"
description        = """
Undo every workspace mutation `setup` and `run` made: revert feature flags,
delete scratch files, and leave the working tree as you found it. The
operator should be able to discard the lane after cleanup with no follow-up.
"""
session_agent_type = "Executor"
predecessors       = ["run"]
