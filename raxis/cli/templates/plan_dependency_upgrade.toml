# RAXIS plan template — `dependency-upgrade`
# DAG: upgrade → test → merge
#
# Bumping a dependency version with regression-test verification. See
# `specs/v2/operator-ergonomics.md §6.3`.

[meta]
version = 1

[plan.initiative]
description = "@@INITIATIVE_NAME@@"

[workspace]
name = "@@INITIATIVE_NAME@@"
lane_id    = "main"
target_ref = "refs/heads/main"

[[tasks]]
task_name            = "upgrade"
name               = "Bump dependency version"
description        = "Bump dependency version"
prompt             = """
Bump the dependency named in @@INITIATIVE_NAME@@ to the new version: edit
the manifest, refresh the lockfile, and surface every breaking-change call
site that needs adjustment. Apply the call-site adjustments in-place; do
not introduce a new abstraction layer.
"""
session_agent_type = "Executor"
clone_strategy     = "blobless"

[[tasks]]
task_name            = "test"
name               = "Run regression suite against the upgrade"
description        = "Run regression suite against the upgrade"
prompt             = """
Run the full test suite against the upgraded dependency. For every test
that fails, decide whether it is a real regression introduced by the
upgrade or an out-of-scope flake; mark each accordingly in the review. Do
not modify production code in this task — flag regressions for follow-up.
"""
session_agent_type = "Reviewer"
predecessors       = ["upgrade"]
