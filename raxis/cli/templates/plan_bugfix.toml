# RAXIS plan template — `bugfix`
# DAG: reproduce → fix → regression-test → merge
#
# The reproduce task generates a failing test; the fix task makes it
# pass; the regression-test task verifies the fix did not break adjacent
# behaviour. See `specs/v2/operator-ergonomics.md §6.3`.

[meta]
version = 1

[plan.initiative]
description = "@@INITIATIVE_NAME@@"

[workspace]
name = "@@INITIATIVE_NAME@@"
lane_id    = "main"
target_ref = "refs/heads/main"

[[tasks]]
task_name            = "reproduce"
name               = "Reproduce bug with a failing test"
description        = "Reproduce bug with a failing test"
prompt             = """
Reproduce @@INITIATIVE_NAME@@ as a failing automated test. Locate the test
module that owns the affected behaviour, add a focused failing test that
demonstrates the bug, and stop as soon as the test fails for the expected
reason. Do not attempt the fix yet.
"""
session_agent_type = "Executor"
clone_strategy     = "blobless"

[[tasks]]
task_name            = "fix"
name               = "Apply the fix"
description        = "Apply the fix"
prompt             = """
Make the failing test from `reproduce` pass without weakening it or any
neighbouring assertions. Keep the change scoped to the smallest set of files
that resolves the regression; refactors stay out of this task.
"""
session_agent_type = "Executor"
predecessors       = ["reproduce"]

[[tasks]]
task_name            = "regression_test"
name               = "Run the regression test suite"
description        = "Run the regression test suite"
prompt             = """
Confirm the fix did not break adjacent behaviour: run the full test suite
for the affected crate, surface any new failures, and verify that the
reproduction test from `reproduce` now passes alongside the existing suite.
"""
session_agent_type = "Reviewer"
predecessors       = ["fix"]
