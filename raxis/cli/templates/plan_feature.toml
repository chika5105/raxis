# RAXIS plan template — `feature`
# DAG: plan → implement → review → merge
#
# Generated by `raxis plan init --template feature`.
# See `specs/v2/operator-ergonomics.md §6.3` for the full template registry.

[meta]
version = 1

[plan.initiative]
description = "@@INITIATIVE_NAME@@"

[workspace]
lane_id    = "main"
target_ref = "refs/heads/main"

# ── Phase 1 — implement the feature ───────────────────────────────────
[[tasks]]
task_id            = "implement_feature"
name               = "Implement feature"
session_agent_type = "Executor"
clone_strategy     = "blobless"

# ── Phase 2 — Reviewer gate before merge ──────────────────────────────
[[tasks]]
task_id            = "review_feature"
name               = "Review feature"
session_agent_type = "Reviewer"
predecessors       = ["implement_feature"]
