# RAXIS plan template — `feature`
# DAG: plan → implement → review → merge
#
# Generated by `raxis plan init --template feature`.
# See `specs/v2/operator-ergonomics.md §6.3` for the full template registry.

[meta]
version = 1

[plan.initiative]
description = "@@INITIATIVE_NAME@@"

[workspace]
name = "@@INITIATIVE_NAME@@"
lane_id    = "main"
target_ref = "refs/heads/main"

# ── Phase 1 — implement the feature ───────────────────────────────────
[[tasks]]
task_name            = "implement_feature"
name               = "Implement feature"
description        = "Implement feature"
prompt             = """
Implement @@INITIATIVE_NAME@@ end-to-end. Read the existing surrounding code
to keep style and naming conventions consistent, add or update tests to cover
the new behaviour, and stop as soon as the feature compiles cleanly and the
new tests pass.
"""
session_agent_type = "Executor"
clone_strategy     = "blobless"

# ── Phase 2 — Reviewer gate before merge ──────────────────────────────
[[tasks]]
task_name            = "review_feature"
name               = "Review feature"
description        = "Review feature"
prompt             = """
Review the implementation produced by `implement_feature`. Confirm: the new
behaviour matches the initiative description, tests are present and exercise
the new code, and there are no obvious regressions in surrounding modules.
"""
session_agent_type = "Reviewer"
predecessors       = ["implement_feature"]
