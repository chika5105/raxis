# RAXIS plan template — `migration`
# DAG: plan → migrate → rollback-test → merge
#
# Schema or configuration migrations; the rollback-test task verifies
# that the prepared rollback plan succeeds against a snapshot of the
# pre-migration state. See `specs/v2/operator-ergonomics.md §6.3`.

[meta]
version = 1

[plan.initiative]
description = "@@INITIATIVE_NAME@@"

[workspace]
name = "@@INITIATIVE_NAME@@"
lane_id    = "main"
target_ref = "refs/heads/main"

[[tasks]]
task_id            = "plan_migration"
name               = "Author the migration and its rollback"
description        = "Author the migration and its rollback"
prompt             = """
Author both the forward migration and a rollback for @@INITIATIVE_NAME@@:
the schema/config diff, the data-backfill script (if any), and the inverse
operations needed to restore the pre-migration state. Do not apply either;
the operator gates the apply step.
"""
session_agent_type = "Executor"
clone_strategy     = "blobless"

[[tasks]]
task_id            = "migrate"
name               = "Apply the migration"
description        = "Apply the migration"
prompt             = """
Apply the migration authored in `plan_migration` against the working
environment. Stop on the first error and surface a structured report; do
not auto-rollback (the operator decides). Do not touch the rollback script
in this task.
"""
session_agent_type = "Executor"
predecessors       = ["plan_migration"]

[[tasks]]
task_id            = "rollback_test"
name               = "Verify the rollback plan succeeds"
description        = "Verify the rollback plan succeeds"
prompt             = """
Run the rollback script authored in `plan_migration` against a snapshot of
the post-migration state. Verify the resulting state matches the
pre-migration baseline byte-for-byte; report any divergence as a blocking
defect in the rollback plan.
"""
session_agent_type = "Reviewer"
predecessors       = ["migrate"]
