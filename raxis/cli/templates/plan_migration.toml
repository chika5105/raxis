# RAXIS plan template — `migration`
# DAG: plan → migrate → rollback-test → merge
#
# Schema or configuration migrations; the rollback-test task verifies
# that the prepared rollback plan succeeds against a snapshot of the
# pre-migration state. See `specs/v2/operator-ergonomics.md §6.3`.

[meta]
version = 1

[plan.initiative]
description = "@@INITIATIVE_NAME@@"

[workspace]
lane_id    = "main"
target_ref = "refs/heads/main"

[[tasks]]
task_id            = "plan_migration"
name               = "Author the migration and its rollback"
session_agent_type = "Executor"
clone_strategy     = "blobless"

[[tasks]]
task_id            = "migrate"
name               = "Apply the migration"
session_agent_type = "Executor"
predecessors       = ["plan_migration"]

[[tasks]]
task_id            = "rollback_test"
name               = "Verify the rollback plan succeeds"
session_agent_type = "Reviewer"
predecessors       = ["migrate"]
