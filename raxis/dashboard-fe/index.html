<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fafaf9" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <title>Raxis Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/raxis-logo.svg" />
    <!--
      Theme bootstrap — runs before first paint so the operator's
      persisted preference wins over the default `class="light"`
      shipped in the HTML. Without this script an operator with
      an explicit dark preference would see a flash of light UI
      before React mounts and React's ThemeProvider
      swaps to the chosen mode.

      Behaviour mirrors `lib/theme.tsx`:
        1. If `localStorage.theme` is "light" or "dark", honour it.
        2. Otherwise, default to light.

      Errors (e.g. `localStorage` blocked in private mode) fall
      through silently — the document already ships light.
    -->
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem("theme");
          var theme;
          if (stored === "light" || stored === "dark") {
            theme = stored;
          } else {
            theme = "light";
          }
          var root = document.documentElement;
          if (theme === "dark") {
            root.classList.add("dark");
            root.classList.remove("light");
          } else {
            root.classList.remove("dark");
            root.classList.add("light");
          }
          var metaTheme = document.querySelector('meta[name="theme-color"]');
          if (metaTheme) {
            metaTheme.setAttribute(
              "content",
              theme === "dark" ? "#0d1117" : "#fafaf9"
            );
          }
        } catch (_e) {
          // Bootstrap is best-effort; default markup is light.
        }
      })();
    </script>
  </head>
  <body class="bg-panel text-ink antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
