# /etc/newsyslog.d/raxis.conf — RAXIS kernel log rotation (macOS).
#
# Normative reference: kernel-lifecycle.md §5.4 + §14.4.
#
# This file is the V2 reference newsyslog snippet for operators
# running RAXIS as a system daemon on macOS. It rotates the kernel's
# stdout / stderr log files at /var/log/raxis/, keeping 10
# generations of up to 10 MB each, gzip-compressed.
#
# Install:
#
#   sudo install -m 0644 -o root -g wheel \
#     raxis/installer/newsyslog/raxis.conf \
#     /etc/newsyslog.d/raxis.conf
#
# Then verify newsyslog picks it up next run (it reads /etc/newsyslog.d/
# on every invocation, no service restart needed):
#
#   sudo newsyslog -nv | grep raxis
#
# Format reference: `man 5 newsyslog.conf`.
#
# Field layout (whitespace-separated):
#
#   <logfile>  <owner:group>  <mode>  <count>  <size_kb>  <when>  <flags>
#
# - <logfile>     — absolute path to the log file
# - <owner:group> — file owner after rotation; the kernel user
#                   (`_raxis:_raxis` by convention; falls back to
#                   `root:wheel` on the developer's machine)
# - <mode>        — file mode after rotation (644)
# - <count>       — number of generations to retain (10)
# - <size_kb>     — rotation threshold in KB (10240 = 10 MB)
# - <when>        — `*` = rotate by size only (no time-based trigger)
# - <flags>       — `J` = gzip-compress rotated files
#
# Why these defaults: kernel-lifecycle.md §5.4 settles on 10 generations
# at 10 MB each = ~100 MB worst-case footprint. That fits comfortably
# inside the macOS audit-log volume budgets and is in line with the
# `journald` defaults the Linux daemon path inherits for free.

/var/log/raxis/kernel.out  _raxis:_raxis  644  10  10240  *  J
/var/log/raxis/kernel.err  _raxis:_raxis  644  10  10240  *  J
