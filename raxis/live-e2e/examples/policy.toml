# RAXIS live-e2e policy.toml — REPRESENTATIVE SNAPSHOT
#
# This file mirrors the policy.toml that the realistic-scenario
# live-e2e harness writes into the kernel's data_dir at iter
# bootstrap. The structure has two parts:
#
#   1. Genesis bootstrap section (epoch 1) — written by
#      `kernel/src/bootstrap.rs::write_genesis_policy` via the
#      shared emitter at
#      `crates/genesis-tools/src/policy_toml.rs::render_genesis_policy_toml`.
#      The keys/fingerprints/timestamps below are PLACEHOLDERS —
#      every live-e2e run mints a fresh operator key and the
#      `signed_by` / `pubkey_hex` / `authority_pubkey` / `quality_pubkey`
#      / `signed_at` fields will diff per-run. Pre-commit checks
#      MUST ignore those diffs in steady state.
#
#   2. Live-e2e harness overlay — written by
#      `kernel/tests/extended_e2e_support/kernel_driver.rs::enable_gateway_in_policy`
#      after bootstrap (look for the
#      `# ── [gateway] + [[providers]] + [egress] + [[lanes]] (realism-e2e) ──`
#      delimiter below). This section is the same byte-for-byte
#      across runs and is the part operators auditing
#      "what configuration produced this run?" care about most.
#
# The auto-refresh hook (`maybe_refresh_examples`, gated on
# `RAXIS_E2E_REFRESH_EXAMPLES=1`) reads the harness's actual
# policy.toml from `<data_dir>/policy/policy.toml` and copies it
# verbatim, so every refreshed copy reflects the exact bytes the
# kernel loaded on that iter.
#
# See `raxis/live-e2e/examples/README.md` for the full refresh
# contract.

# ─── §1. Genesis bootstrap (epoch 1) ─────────────────────────
#
# Emitted by `raxis_genesis_tools::render_genesis_policy_toml`.
# Keys below are PLACEHOLDERS; real runs mint fresh ed25519 keys.

# RAXIS v1 policy artifact — generated by genesis ceremony.
# Schema: raxis_policy::PolicyBundle (crates/policy/src/bundle.rs).
# Sign with: raxis policy sign policy.toml --key <operator_private_key>.

[meta]
epoch         = 1
signed_by     = "PLACEHOLDER_OPERATOR_FINGERPRINT_PER_RUN"
signed_at     = 1700000000

[authority]
authority_pubkey = "PLACEHOLDER_AUTHORITY_PUBKEY_HEX_PER_RUN"
quality_pubkey   = "PLACEHOLDER_QUALITY_PUBKEY_HEX_PER_RUN"

[escalation_policy]
timeout_secs         = 3600
window_secs          = 300
max_per_window       = 5
quarantine_threshold = 3

[sessions]
default_ttl_secs       = 86400
max_ttl_secs           = 604800
# Placeholder — REPLACE before creating sessions. See cli-ceremony.md §4.2.
allowed_worktree_roots = ["/private/tmp/PLACEHOLDER-DATA-DIR/worktrees"]

[delegations]
max_ttl_secs = 86400

[budget]
cost_per_touched_path = 1
max_cost_per_task     = 10000

[budget.base_cost_per_intent_kind]
# The actual rendering pads kind keys to 17 chars; representative
# rows below mirror the shape — see
# `crates/genesis-tools/src/policy_toml.rs::BASE_COST_PER_INTENT_KIND`
# for the canonical full list.
Lifecycle         = 1
CommitDelta       = 5
ReviewerCritique  = 3

[[operators.entries]]
pubkey_fingerprint = "PLACEHOLDER_OPERATOR_FINGERPRINT_PER_RUN"
display_name       = "realism-e2e-operator"
pubkey_hex         = "PLACEHOLDER_OPERATOR_PUBKEY_HEX_PER_RUN"
permitted_ops      = [
  "CreateInitiative",
  "ApprovePlan",
  "AbortInitiative",
  # `RotateEpoch` + `OperatorCertInstall` together grant the
  # dashboard `Admin` role (per
  # `crates/dashboard-kernel/src/lib.rs::roles_from_permitted_ops`).
  # Live-e2e operators run as Admin so the test exercises the full
  # operator surface (reveal-plaintext, dashboard policy install,
  # every grant/deny audit path).
  "RotateEpoch",
  "OperatorCertInstall",
]

[operators.entries.cert]
# Self-signed cert body emitted by `toml::to_string(operator_cert)`.
# Every field varies per run. See `raxis_types::OperatorCert` for
# the schema.
display_name  = "realism-e2e-operator"
issued_at     = 1700000000
expires_at    = 1700090000
permitted_ops = ["CreateInitiative", "ApprovePlan", "AbortInitiative", "RotateEpoch", "OperatorCertInstall"]
signature_hex = "PLACEHOLDER_CERT_SIGNATURE_HEX_PER_RUN"

[[lanes]]
lane_id              = "default"
max_concurrent_tasks = 8
max_cost_per_epoch   = 10000
priority             = 100

[dashboard]
enabled      = true
bind_address = "127.0.0.1"
bind_port    = 19820
jwt_ttl_secs = 86400

# ── External provider integration (OPTIONAL) ──────────────────────────
# Uncomment the [gateway] block and at least one [[providers]] entry to
# enable inference / data-fetch. Provider credentials live separately
# under <data_dir>/providers/<credentials_file> (mode 0600); the kernel
# NEVER reads provider credentials directly. See peripherals.md §3.2.
#
# (The realism-e2e harness uncomments these in §2 below.)

# ─── §2. Live-e2e harness overlay ─────────────────────────────
#
# Appended verbatim by
# `kernel/tests/extended_e2e_support/kernel_driver.rs::enable_gateway_in_policy`
# after bootstrap. This is the part of policy.toml that is
# byte-stable across runs and that operators auditing "what
# configuration produced this run?" key on.

# ── [gateway] + [[providers]] + [egress] + [[lanes]] (realism-e2e) ──
[gateway]
binary_path              = "/PLACEHOLDER/path/to/target/release/raxis-gateway"
spawn_timeout_secs       = 30
respawn_backoff_ms       = 1000
max_consecutive_respawns = 5

# `example.com` admits the iter65 dep-fetch-evidence task's
# one HTTPS GET via Path A3; the witness in
# `extended_e2e_support::dep_fetch_evidence` pins exactly one
# `TproxyAdmissionGranted{host_or_sni="example.com",port=443}`
# per executor session. RFC-2606 reserved, IANA-maintained.
[egress]
domains = ["api.anthropic.com", "example.com"]
patterns = []

[[providers]]
provider_id           = "anthropic-realism-e2e"
kind                  = "Anthropic"
credentials_file      = "anthropic-realism-e2e.toml"
inference_timeout_ms  = 120000
data_fetch_timeout_ms = 30000
pricing.input_tokens_per_dollar      = 200000
pricing.output_tokens_per_dollar     = 50000
pricing.cache_read_tokens_per_dollar = 2000000

# ── [[lanes]] registration (V2 §Step 28 + INV-SCHED-03) ─────────
# The realistic-scenario plans declare `[workspace] lane_id =
# "e2e-realistic-lane"` (primary plan, `plan_realistic.rs`)
# and `[workspace] lane_id = "e2e-realistic-sibling-lane"`
# (sibling plan, `multi_initiative.rs`). The kernel-side
# `lifecycle::validate_workspace_lane_in_policy` rejects any
# plan whose workspace lane has no matching `[[lanes]]` entry
# — without these blocks `lifecycle::approve_plan` returns
# `LifecycleError::PlanLaneNotInPolicy` BEFORE the tx opens,
# and the harness sees an admission failure instead of an
# `IntegrationMergeCompleted`. (Pre-fix, the lane absence
# collapsed silently to a per-IntegrationMerge
# `FailBudgetExceeded` rejection because `lane_config_for_row`
# returned `NoLaneAssigned` and `intent.rs::run_phase_c` Step
# 10 maps that to the wire-level budget error — the
# iter-38/39 reproduction.)
#
# Caps are sized generously so the per-task cost
# (`base_cost_for_intent_kind` + `cost_per_touched_path *
# |touched_paths|`) on every realistic-scenario task clears
# comfortably with margin for the synthetic IntegrationMerge
# coordinator slice.
[[lanes]]
lane_id              = "e2e-realistic-lane"
max_concurrent_tasks = 8
max_cost_per_epoch   = 100000
priority             = 100

[[lanes]]
lane_id              = "e2e-realistic-sibling-lane"
max_concurrent_tasks = 8
max_cost_per_epoch   = 100000
priority             = 100

# ── [[gates]] — witness verifier (iter62 / iter63) ──
# Real, fast worktree-scanning gate. Source:
# `crates/verifier-no-secrets/`. Every `IntegrationMerge`
# intent transitions `Admitted → GatesPending` and the kernel
# `scheduler/dag.rs::transition_to_admitted` blocks the merge
# until a `VerifierWitnessReceived{gate_type="NoSecretStrings",
# verdict="Pass"}` row lands on the audit chain. See
# `INV-WITNESS-VERIFIER-LIVE-E2E-EXERCISED-01` for the rationale
# (this is the live coverage point for the iter63 recheck-clear
# paired-write audit row) and `INV-GATE-PRECEDENCE-01` for the
# kernel's gate-then-merge ordering contract.
#
# The `verifier_command` value below is a PLACEHOLDER — at run
# time the harness in
# `kernel/tests/extended_e2e_support/kernel_driver.rs::enable_gateway_in_policy`
# rewrites this line to the absolute path of the
# `raxis-verifier-no-secrets` binary that sits alongside the
# kernel build (typically `target/release/raxis-verifier-no-secrets`).
# Operators running the kernel outside the e2e harness must
# substitute the absolute path themselves.
[[gates]]
gate_type        = "NoSecretStrings"
verifier_command = "/PLACEHOLDER/path/to/target/release/raxis-verifier-no-secrets"
max_wall_seconds = 30
max_memory_bytes = 268435456
network_allowed  = false
# iter65 — tier-2 fallback for the `agent_hint` resolution chain
# (`INV-WITNESS-AGENT-HINT-RESOLUTION-TIERS-01`). The verifier's
# `body.agent_hint` (tier 1) is the preferred source — populated
# per failure code path by `raxis-verifier-no-secrets`. This
# `agent_hint_default` only fires when a verifier author shipped
# a Fail / Inconclusive without a wire-valid hint (e.g. an early
# build before the verifier was migrated to the typestate SDK).
# Required at policy load whenever `[gate_fixup].enabled = true`.
agent_hint_default = "A `NoSecretStrings` gate detected secret-shaped material in your commit. Remove any literal API keys, tokens, or credentials and reference them via env vars or your secret store instead. Re-run your local secret scanner before resubmitting."

# ── [observability] (realism-e2e — V3 OTel push) ──
[observability]
enabled = true

[observability.ring]
segment_max_bytes = 16777216
max_total_bytes   = 268435456
max_queue_depth   = 4096

[observability.metrics]
enabled         = true
export_interval = "5s"

[observability.resource]
service_name = "raxis-kernel-live-e2e"
environment  = "live-e2e"

[observability.resource.extra]
run_kind = "realistic-scenario"

[observability.pusher]
otlp_endpoint       = "http://127.0.0.1:4318"
otlp_protocol       = "http"
otlp_compression    = "gzip"
otlp_export_timeout = "10s"
otlp_batch_size     = 256
otlp_flush_interval = "1s"
otlp_max_inflight   = 4
