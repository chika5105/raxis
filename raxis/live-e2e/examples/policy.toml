# ── External provider integration (OPTIONAL) ──────────────────────────
# Uncomment the [gateway] block and at least one [[providers]] entry to
# enable inference / data-fetch. Provider credentials live separately
# under <data_dir>/providers/<credentials_file> (mode 0600); the kernel
# NEVER reads provider credentials directly. See peripherals.md §3.2.
#
# [gateway]
# binary_path              = "/usr/local/bin/raxis-gateway"
# spawn_timeout_secs       = 5
# respawn_backoff_ms       = 1000
# max_consecutive_respawns = 5
#
# [[providers]]
# provider_id           = "anthropic-prod"
# kind                  = "Anthropic"
# credentials_file      = "anthropic-prod.toml"
# inference_timeout_ms  = 30000
# data_fetch_timeout_ms = 10000
# max_response_bytes    = 16777216
# # pricing is REQUIRED for every
# # model-bearing provider kind (Anthropic, OpenAI, Gemini,
# # Bedrock, http_sidecar). Operators declare the inverse of
# # the published per-million price (tokens per US dollar) so
# # the kernel can compute cost via integer math.
# pricing.input_tokens_per_dollar  = 200000   # $5  / 1M input
# pricing.output_tokens_per_dollar = 50000    # $20 / 1M output
# # pricing.cache_read_tokens_per_dollar    = 2000000  # $0.50 / 1M cache hit
# # pricing.cache_creation_tokens_per_dollar = 160000  # $6.25 / 1M cache write

# ── [gateway] + [[providers]] + [egress] + [[lanes]] (realism-e2e) ──
[gateway]
binary_path              = "/Users/jinanwachikafavour/raxis/raxis/target/release/raxis-gateway"
spawn_timeout_secs       = 30
respawn_backoff_ms       = 1000
max_consecutive_respawns = 5
planner_model_orchestrator_chain = ["claude-3-haiku-20240307", "gemini-2.5-flash", "gpt-5.3-codex"]
planner_model_executor_chain     = ["claude-3-haiku-20240307", "gemini-2.5-flash", "gpt-5.3-codex"]
planner_model_executor_rotate_primary = true
planner_model_reviewer_chain     = ["gpt-5.3-codex", "claude-3-haiku-20240307", "gemini-2.5-flash"]

# `example.com` admits the iter65 dep-fetch-evidence task's
# one HTTPS GET via Path A3; the witness in
# `extended_e2e_support::dep_fetch_evidence` pins exactly one
# `TproxyAdmissionGranted{host_or_sni="example.com",port=443}`
# per executor session. RFC-2606 reserved, IANA-maintained.
#
# `pypi.org` + `files.pythonhosted.org` are the two hosts
# `pip install` reaches at runtime — pypi.org for the
# simple-index resolution + JSON metadata, then
# files.pythonhosted.org for the wheel download. The same
# dep-fetch-evidence task chains a `pip install` after the
# example.com fetch, and the witness verifies the install
# via the `--report` JSON (wheel sha256 + package version).
[egress]
domains = ["api.anthropic.com", "api.openai.com", "generativelanguage.googleapis.com", "example.com", "pypi.org", "files.pythonhosted.org"]
patterns = []

[[providers]]
