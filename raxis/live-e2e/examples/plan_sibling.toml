[plan.initiative]
description = """
Realistic-scenario sibling initiative — submitted in parallel
with the primary realistic initiative to assert per-initiative
audit-chain isolation and conflict-free concurrent target-ref
composition.

Distinct lane id ensures budget reservations cannot interleave
across initiatives. Distinct task_id namespace
("sibling-materialize-records") ensures the
`MultiInitiativeIsolationWitness` partitioning predicate is
materially testable. Distinct output paths keep the sibling's
evidence subtree disjoint from the primary materializer while both
initiatives still publish to refs/heads/main.
"""

[workspace]
name = "E2E realistic sibling"
lane_id = "e2e-realistic-sibling-lane"
repository = "main"
target_ref = "refs/heads/main"

# ── Sibling materializer Executor (P3-6) ────────────────
[[tasks]]
task_name            = "sibling-materialize-records"
session_agent_type = "Executor"
clone_strategy     = "blobless"
# Same workload as `materialize-records` (25 pg rows + 25 mongo docs +
# 50 file writes + commit), but written under `out/sibling/` so the
# shared refs/heads/main integration path exercises concurrent
# target-ref preservation without an intentional add/add conflict
# against the primary materializer. 150 mirrors the primary
# materializer for `INV-PLANNER-MAX-TURNS-PRECEDENCE-01`.
max_turns          = 150
path_allowlist     = ["out/sibling/postgres/", "out/sibling/mongo/", "out/sibling/manifest.json"]
description        = "Materialize sibling postgres rows and mongo docs to JSON files."
prompt = """
# Materialize seeded records

Export the seeded Postgres and Mongo records into deterministic JSON artifacts
for the integration evidence bundle.

## Goal

Use the database URLs already present in the environment:

- `DATABASE_URL` for Postgres.
- `MONGO_URL` for MongoDB.

Create:

- `out/sibling/postgres/<id>.json` for every row in Postgres table `seeded_rows`.
- `out/sibling/mongo/<doc_id>.json` for every document in Mongo collection
  `seeded_docs` in database `raxis_e2e_mongo`.
- Optionally `out/sibling/manifest.json` summarizing counts and source names.

The expected seed size is 25 Postgres rows and 25 Mongo documents.

## Output contract

Each Postgres JSON file should include:

- `id`
- `payload`
- `created_at`

Each Mongo JSON file should include:

- `_id_hex`
- `doc_id`
- `payload`
- `created_at`

Order records deterministically before writing files. Use canonical JSON where
practical so reruns are stable.

## Boundaries

- Do not make external HTTP calls.
- Keep helper scripts outside the repository.
- Commit only `out/sibling/postgres/`, `out/sibling/mongo/`, and the optional manifest.

Complete the task with the row counts and artifact paths.

"""

  [[tasks.credentials]]
  name       = "test-pg-dev"
  proxy_type = "postgres"
  mount_as   = "DATABASE_URL"

  [[tasks.credentials]]
  name       = "test-mongo-dev"
  proxy_type = "mongodb"
  mount_as   = "MONGO_URL"