# full wiring contract.
#
# `on_failure = "warn_only"` so a transient verifier failure does
# NOT break the existing materialize-records flow (the realistic
# scenario already covers the unhappy paths via dedicated failure-
# mode tasks; the symbol-index verifier is additive coverage of the
