(OUT_DIR / "postgres.txt").write_text("".join(pg_lines))

# â”€â”€ mongodb â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
import pymongo
mongo = pymongo.MongoClient(
    os.environ["MONGO_URL"],
    serverSelectionTimeoutMS=60_000,
    directConnection=True,
)
# Force a server-selection round-trip so the connection error
# surfaces here, not inside the find() iterator below.
mongo.admin.command("ping")
mdb     = mongo["raxis_e2e_mongo"]
docs    = list(
    mdb["service_evidence_mongo"]
        .find({}, {"_id": 0, "doc_id": 1, "label": 1, "magic": 1})
        .sort("doc_id", 1)
)
mongo_lines = [
    # Canonical key order: doc_id, label, magic â€” match the
    # witness exactly.
    json.dumps(
        {"doc_id": d["doc_id"], "label": d["label"], "magic": d["magic"]},
        separators=(",", ":"),
    ) + "\n"
    for d in docs
]
(OUT_DIR / "mongodb.txt").write_text("".join(mongo_lines))
mongo.close()

# â”€â”€ redis â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
import redis
r = redis.Redis.from_url(os.environ["REDIS_URL"])
r.ping()
keys = sorted(
    k.decode() for k in r.scan_iter(match="service-evidence:*")
