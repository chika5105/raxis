# live-e2e/docker-compose.extended.e2e.yml
#
# Extended infrastructure for the extended E2E scenario test
# (`raxis/kernel/tests/extended_e2e_concurrent_lifecycle.rs`,
#  spec'd in `raxis/specs/v2/e2e-extended-scenario.md`).
#
# This file is a SUPERSET of `docker-compose.e2e.yml`: same service
# names, ports, credentials, tmpfs mounts, and healthcheck shape so
# the existing `full_e2e_session_lifecycle.rs` keeps passing against
# either compose file. The extended scenario additionally:
#
#   * Creates a logical sub-database `raxis_e2e_pg` on the postgres
#     side (via the seed script's `\connect`-then-`CREATE TABLE`
#     pattern).
#   * Creates a `raxis_e2e_mongo` database on the mongo side with a
#     `seeded_docs` collection (via the seed script).
#   * Mounts `live-e2e/seed/postgres/` into the postgres container's
#     `/docker-entrypoint-initdb.d/` so the seed runs at first boot.
#   * Mounts `live-e2e/seed/mongo/` into the mongo container's
#     `/docker-entrypoint-initdb.d/` for the same reason.
#
# Includes observability triple (OTel/Prom/Grafana) so live-e2e
# dashboards populate end-to-end. Service blocks, ports, and
# `../observability/...` mount paths mirror `docker-compose.e2e.yml`
# byte-for-byte; both compose files share the
# `raxis-live-e2e-test_prometheus_data` /
# `raxis-live-e2e-test_grafana_data` named volumes via the common
# `name:` namespace.
#
# Storage: tmpfs only — every `up` is a clean slate. The seeds are
# idempotent, so re-applying them via `psql` / `mongosh` from the
# harness's preflight is safe and the test never depends on
# persistence.
#
# Run:
#   docker compose -f live-e2e/docker-compose.extended.e2e.yml up -d --wait
#   RAXIS_LIVE_E2E=1 cargo test -p raxis-kernel \
#       --test extended_e2e_concurrent_lifecycle -- --nocapture
#   docker compose -f live-e2e/docker-compose.extended.e2e.yml down -v
#
# # Project name
#
# Same explicit `name:` namespace as `docker-compose.e2e.yml` so
# both compose files share resource prefixes (network, volumes,
# auto-generated container names) — the extended file is a
# superset, so an operator switching between the two should not
# see two parallel `live-e2e_*` / `raxis-live-e2e-test_*`
# resource sets fight over the same host ports.

name: raxis-live-e2e-test

services:
  postgres:
    image: postgres:16-alpine
    container_name: raxis-e2e-pg
    ports:
      - "127.0.0.1:54399:5432"
    environment:
      POSTGRES_USER: raxis_test
      POSTGRES_PASSWORD: raxis_test_pass
      # `raxis_e2e` is the legacy DB the single-task test connects
      # to. The extended scenario's seed script creates `raxis_e2e_pg`
      # on top.
      POSTGRES_DB: raxis_e2e
    volumes:
      # Read-only bind: docker-entrypoint runs every *.sql here in
      # alphabetical order at first boot.
      - ./seed/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raxis_test -d raxis_e2e"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: raxis-e2e-mongo
    command: ["--auth", "--bind_ip", "0.0.0.0"]
    ports:
      - "127.0.0.1:27399:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: raxis_test
      MONGO_INITDB_ROOT_PASSWORD: raxis_test_pass
    volumes:
      # Read-only bind: docker-entrypoint runs every *.js here via
      # mongosh after the auth-bootstrap step at first boot.
      - ./seed/mongo:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: >
        mongosh --quiet
        -u raxis_test -p raxis_test_pass --authenticationDatabase admin
        --eval "db.adminCommand({ ping: 1 }).ok"
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /data/db

  redis:
    image: redis:7-alpine
    container_name: raxis-e2e-redis
    # `--requirepass` matches `REDIS_REQUIREPASS` in
    # `slice_redis_proxy.rs`. `--save ""` and `--appendonly no`
    # disable both persistence backends so the container is a
    # pure-RAM instance — every `down -v` is a clean slate (matching
    # the postgres/mongo tmpfs convention).
    command:
      - "redis-server"
      - "--requirepass"
      - "raxis_test_pass"
      - "--appendonly"
      - "no"
      - "--save"
      - ""
    ports:
      - "127.0.0.1:63799:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "raxis_test_pass", "PING"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /data

  smtp:
    image: docker.io/mailserver/docker-mailserver:14.0
    container_name: raxis-e2e-smtp
    hostname: mail.live-e2e.test
    ports:
      - "127.0.0.1:25199:25"
    environment:
      OVERRIDE_HOSTNAME: mail.live-e2e.test
      POSTMASTER_ADDRESS: postmaster@live-e2e.test
      ENABLE_CLAMAV: "0"
      ENABLE_AMAVIS: "0"
      ENABLE_SPAMASSASSIN: "0"
      ENABLE_FAIL2BAN: "0"
      ENABLE_OPENDKIM: "0"
      ENABLE_OPENDMARC: "0"
      ENABLE_POSTGREY: "0"
      ENABLE_RSPAMD: "0"
      ENABLE_SRS: "0"
      ENABLE_MTA_STS: "0"
      ENABLE_UPDATE_CHECK: "0"
      SMTP_ONLY: "0"
      SSL_TYPE: ""
      PERMIT_DOCKER: connected-networks
      LOG_LEVEL: warn
      ONE_DIR: "1"
    cap_add:
      - NET_ADMIN
    volumes:
      - ./seed/smtp/postfix-accounts.cf:/tmp/docker-mailserver/postfix-accounts.cf:ro
      - ./seed/smtp/postfix-virtual.cf:/tmp/docker-mailserver/postfix-virtual.cf:ro
      - ./seed/smtp/postfix-main.cf:/tmp/docker-mailserver/postfix-main.cf:ro
    healthcheck:
      test:
        - CMD-SHELL
        - "ss -ltn | grep -q ':25 ' && supervisorctl status postfix | grep -q RUNNING"
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s
    tmpfs:
      - /var/mail
      - /var/mail-state
      - /var/log/mail
      - /tmp

  mysql:
    image: mysql:8.0.36
    container_name: raxis-e2e-mysql
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--bind-address=0.0.0.0"
      - "--skip-name-resolve"
    ports:
      - "127.0.0.1:33099:3306"
    environment:
      MYSQL_ROOT_PASSWORD: raxis_test_pass
      MYSQL_DATABASE: raxis_e2e
      MYSQL_USER: raxis_test
      MYSQL_PASSWORD: raxis_test_pass
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - "-h"
        - "127.0.0.1"
        - "-u"
        - "raxis_test"
        - "-praxis_test_pass"
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 20s
    tmpfs:
      - /var/lib/mysql

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: raxis-e2e-mssql
    user: root
    ports:
      - "127.0.0.1:14399:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: "raxis_Test_Pass1!"
    healthcheck:
      test:
        - CMD-SHELL
        - "/opt/mssql-tools18/bin/sqlcmd -C -S 127.0.0.1 -U sa -P 'raxis_Test_Pass1!' -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S 127.0.0.1 -U sa -P 'raxis_Test_Pass1!' -Q 'SELECT 1'"
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 25s
    tmpfs:
      - /var/opt/mssql/data
      - /var/opt/mssql/log
      - /var/opt/mssql/secrets

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: raxis-e2e-otel
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../observability/otel-collector/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:8889:8889"
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:13133:13133"
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "components"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: raxis-e2e-prom
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=14d"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.listen-address=:9090"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  grafana:
    image: grafana/grafana:11.3.0
    container_name: raxis-e2e-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/00-overview.json
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: raxis-e2e
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  prometheus_data:
  grafana_data:
