# live-e2e/docker-compose.e2e.yml
# Dedicated infrastructure for the full E2E lifecycle test
# (`raxis/kernel/tests/full_e2e_session_lifecycle.rs`) AND for every
# `raxis-live-e2e` slice that needs a real upstream service.
#
#§2.1.
#
# # Services
#
#   * `postgres` (5432 → 54399) — kernel-side credential proxies and
#     the `postgres-proxy` slice's real-upstream mode.
#   * `mongodb` (27017 → 27399) — same role for the mongo proxy.
#   * `redis`   (6379 → 63799) — `redis-proxy` slice; replaces the
#     historical in-process RESP fixture so we exercise real TTL
#     semantics, real RESP3 NOPROTO downgrade against a real server,
#     and real upstream AUTH success/failure rather than only the
#     handshake bytes a fixture chooses to emit.
#   * `smtp`    (25 → 25199)   — `smtp-proxy` slice; runs the real
#     `docker-mailserver` image so the proxy speaks SMTP against a
#     real Postfix MTA. Trade-off: docker-mailserver is heavier than
#     test-focused alternatives like Mailpit/MailHog (which expose
#     an HTTP capture API), but it is the team-wide preferred image
#     and the harness inspects deliveries by `docker exec`-ing into
#     the container's `Maildir/new`.
#   * `mysql`   (3306 → 33099) — `mysql-proxy` slice's real-upstream
#     mode. Replaces the historical "hermetic / unreachable URL"
#     default with an actual MySQL 8.0 server so the proxy's
#     handshake AND the upstream forwarding path both run against
#     real `mysql_native_password` SASL.
#   * `mssql`   (1433 → 14399) — `mssql-proxy` slice's real-upstream
#     mode. Replaces the same hermetic-URL default with a real
#     SQL Server 2022 (Developer edition; `MSSQL_PID=Developer` is
#     the supported test/dev licensing path).
#
# Ports are deliberately offset from defaults to avoid colliding
# with any operator-side databases the developer may already be
# running on the canonical ports. The kernel + its credential
# proxies bind to `127.0.0.1:0` (loopback only) and never reach
# these containers except via the proxies, so all traffic stays on
# localhost.
#
# Storage: tmpfs only — every `up` is a clean slate. The test
# asserts on its own ephemeral schema; we do not persist between
# runs.
#
# Health checks must report "healthy" before the kernel test fires.
# The `--wait` flag on `docker compose up` blocks until every
# healthcheck transitions to healthy or times out.
#
# Run:
#   docker compose -f live-e2e/docker-compose.e2e.yml up -d --wait
#   RAXIS_LIVE_E2E=1 cargo test -p raxis-kernel \
#       --test full_e2e_session_lifecycle -- --nocapture
#   docker compose -f live-e2e/docker-compose.e2e.yml down -v
#
# # Image-version policy
#
# Every image is pinned to a SPECIFIC minor tag (no `:latest`). A
# silent base-image bump under the test suite would re-introduce
# the same "mocked external service papered over a regression"
# problem this compose file exists to solve — a Redis 8.x semantic
# change (e.g. RESP3 default) would shift behaviour without any
# code change in this repo. Bumping a tag here is a deliberate,
# reviewable action.
#
# # Project name
#
# `name:` pins the compose project namespace explicitly to
# `raxis-live-e2e-test`. Without it, docker derives the project
# name from the parent directory (`live-e2e`), which produces
# generic resource names like `live-e2e_default` (network) and
# `live-e2e_prometheus_data` (volume) — those are easy to confuse
# with non-raxis projects on a shared developer host. Pinning the
# namespace gives every container, network, and named volume a
# stable `raxis-live-e2e-test*` prefix regardless of how the user
# invokes `docker compose -f <path>` from any cwd.
#
# Migration: a one-time `docker compose -f \
# live-e2e/docker-compose.e2e.yml -p live-e2e down -v` removes
# resources left behind from the previous implicit `live-e2e`
# namespace. See `live-e2e/README.md` for the dev runbook.

name: raxis-live-e2e-test

services:
  postgres:
    image: postgres:16-alpine
    container_name: raxis-e2e-pg
    ports:
      - "127.0.0.1:54399:5432"
    environment:
      POSTGRES_USER: raxis_test
      POSTGRES_PASSWORD: raxis_test_pass
      POSTGRES_DB: raxis_e2e
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raxis_test -d raxis_e2e"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: raxis-e2e-mongo
    command: ["--auth", "--bind_ip", "0.0.0.0"]
    ports:
      - "127.0.0.1:27399:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: raxis_test
      MONGO_INITDB_ROOT_PASSWORD: raxis_test_pass
    healthcheck:
      test: >
        mongosh --quiet
        -u raxis_test -p raxis_test_pass --authenticationDatabase admin
        --eval "db.adminCommand({ ping: 1 }).ok"
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /data/db

  redis:
    image: redis:7-alpine
    container_name: raxis-e2e-redis
    # `--requirepass` matches `REDIS_REQUIREPASS` in
    # `slice_redis_proxy.rs`. `--save ""` and `--appendonly no`
    # disable both persistence backends so the container is a
    # pure-RAM instance — every `down -v` is a clean slate (matching
    # the postgres/mongo tmpfs convention).
    command:
      - "redis-server"
      - "--requirepass"
      - "raxis_test_pass"
      - "--appendonly"
      - "no"
      - "--save"
      - ""
    ports:
      - "127.0.0.1:63799:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "raxis_test_pass", "PING"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /data

  smtp:
    image: docker.io/mailserver/docker-mailserver:14.0
    container_name: raxis-e2e-smtp
    hostname: mail.live-e2e.test
    ports:
      - "127.0.0.1:25199:25"
    environment:
      # docker-mailserver is opinionated about its hostname matching
      # the published TLS / banner; pin it to a deterministic test
      # domain so every dev / CI box presents the same EHLO banner.
      OVERRIDE_HOSTNAME: mail.live-e2e.test
      POSTMASTER_ADDRESS: postmaster@live-e2e.test
      # Strip every optional component — the live-e2e harness only
      # needs Postfix + Dovecot SASL. ClamAV / SpamAssassin / DKIM
      # / DMARC / Postgrey / Rspamd / SRS / MTA-STS would each
      # blow up boot time and memory without adding any coverage
      # the SMTP credential proxy slice needs.
      ENABLE_CLAMAV: "0"
      ENABLE_AMAVIS: "0"
      ENABLE_SPAMASSASSIN: "0"
      ENABLE_FAIL2BAN: "0"
      ENABLE_OPENDKIM: "0"
      ENABLE_OPENDMARC: "0"
      ENABLE_POSTGREY: "0"
      ENABLE_RSPAMD: "0"
      ENABLE_SRS: "0"
      ENABLE_MTA_STS: "0"
      ENABLE_UPDATE_CHECK: "0"
      # SMTP_ONLY would skip Dovecot, but the proxy's AUTH PLAIN
      # handshake requires the Dovecot SASL backend behind Postfix.
      # Keep Dovecot up; we still skip every other optional service.
      SMTP_ONLY: "0"
      SSL_TYPE: ""
      PERMIT_DOCKER: connected-networks
      LOG_LEVEL: warn
      ONE_DIR: "1"
    cap_add:
      # docker-mailserver flips a sysctl during boot to size its
      # postfix queue; without NET_ADMIN the entrypoint logs a noisy
      # warning. Cap is otherwise unused.
      - NET_ADMIN
    volumes:
      # Pre-bake the single account `raxis-tenant@live-e2e.test`
      # whose plaintext password matches `UPSTREAM_PASS` in
      # `slice_smtp_proxy.rs`. Aliases route `rcpt-a@` and `rcpt-b@`
      # into the same mailbox so the slice can drive a multi-
      # recipient envelope without provisioning extra users.
      - ./seed/smtp/postfix-accounts.cf:/tmp/docker-mailserver/postfix-accounts.cf:ro
      - ./seed/smtp/postfix-virtual.cf:/tmp/docker-mailserver/postfix-virtual.cf:ro
      # Override the inbound port-25 SASL policy so the proxy's
      # AUTH PLAIN handshake reaches a real Cyrus/Dovecot SASL
      # decision — see the file's header for the rationale.
      - ./seed/smtp/postfix-main.cf:/tmp/docker-mailserver/postfix-main.cf:ro
    healthcheck:
      # Postfix's master process is up AND listening on port 25.
      # `start_period: 30s` matches the worst-case docker-mailserver
      # boot time we see on a cold pull.
      test:
        - CMD-SHELL
        - "ss -ltn | grep -q ':25 ' && supervisorctl status postfix | grep -q RUNNING"
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s
    tmpfs:
      - /var/mail
      - /var/mail-state
      - /var/log/mail
      - /tmp

  mysql:
    image: mysql:8.0.36
    container_name: raxis-e2e-mysql
    command:
      # The proxy's V2 MVP authenticates with
      # `mysql_native_password`; pin the server to this default
      # so a future `caching_sha2_password` flip in MySQL 8.4+
      # cannot break the slice silently.
      - "--default-authentication-plugin=mysql_native_password"
      - "--bind-address=0.0.0.0"
      - "--skip-name-resolve"
    ports:
      - "127.0.0.1:33099:3306"
    environment:
      MYSQL_ROOT_PASSWORD: raxis_test_pass
      MYSQL_DATABASE: raxis_e2e
      MYSQL_USER: raxis_test
      MYSQL_PASSWORD: raxis_test_pass
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - "-h"
        - "127.0.0.1"
        - "-u"
        - "raxis_test"
        - "-praxis_test_pass"
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 20s
    tmpfs:
      - /var/lib/mysql

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: raxis-e2e-mssql
    # The 2022 image runs as `mssql` (UID 10001) by default; root
    # is required for the tmpfs mount under /var/opt/mssql to be
    # writeable when docker mounts it on macOS / podman.
    user: root
    ports:
      - "127.0.0.1:14399:1433"
    environment:
      ACCEPT_EULA: "Y"
      # Microsoft licenses the `Developer` edition for free use in
      # dev/test only. Production traffic requires a different
      # PID — the live-e2e harness is explicitly dev/test only.
      MSSQL_PID: Developer
      # Password must satisfy SQL Server's "strong" policy: ≥ 8
      # chars, mixed case, digit, symbol.
      MSSQL_SA_PASSWORD: "raxis_Test_Pass1!"
    healthcheck:
      test:
        - CMD-SHELL
        - "/opt/mssql-tools18/bin/sqlcmd -C -S 127.0.0.1 -U sa -P 'raxis_Test_Pass1!' -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S 127.0.0.1 -U sa -P 'raxis_Test_Pass1!' -Q 'SELECT 1'"
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 25s
    tmpfs:
      - /var/opt/mssql/data
      - /var/opt/mssql/log
      - /var/opt/mssql/secrets

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: raxis-e2e-otel
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../observability/otel-collector/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:8889:8889"
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:13133:13133"
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "components"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: raxis-e2e-prom
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=14d"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.listen-address=:9090"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  grafana:
    image: grafana/grafana:11.3.0
    container_name: raxis-e2e-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/00-overview.json
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: raxis-e2e
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  prometheus_data:
  grafana_data:
