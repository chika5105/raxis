[project]
name            = "sample-py"
version         = "0.1.0"
description     = "Python workspace member for the rich-multilang-001 e2e fixture."
requires-python = ">=3.10"

[project.scripts]
sample-py = "sample_py.cli:main"

[build-system]
requires      = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
