# Scenario 33 — coverage witness.

[plan.initiative]
description = """
Coverage witness (scenario 33)
"""
[workspace]
name = "Coverage Witness"
lane_id     = "coverage-lane"

[[tasks]]
task_id            = "extend-with-coverage"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["src/"]
description        = "Extend With Coverage"
prompt             = """
  Add `pub fn sub(a, b)` and matching tests. Coverage must stay
  above 80%.
"""

[[tasks.witnesses]]
kind = "Mechanical"
command = ["sh", "-c",
  "cargo llvm-cov --quiet --summary-only --fail-under-lines 80"]
exit_code_eq = 0
