# Scenario 31 — pre-merge symbol-index verifier (deferred surface).

[plan.initiative]
description = """
Pre merge symbol index (scenario 31)
"""
[workspace]
name = "Pre Merge Symbol Index"
lane_id     = "premerge-index-lane"
repository  = "main"
target_ref  = "refs/heads/main"

[[tasks]]
task_name            = "edit"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["src/"]
description = "symbol-index"
prompt             = """
Add `pub fn nop() {}` to src/lib.rs.
"""
[[plan.integration_merge_verifiers]]
name       = "symbol_index"
image      = "raxis-verifier-symbol-index"
command    = "find src -name '*.rs' | head -1"
timeout    = "30s"
on_failure = "block_merge"
artifact   = "/raxis/symbol-index.json"
