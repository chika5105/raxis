# Scenario 10 — coordinated API contract change.

[plan.initiative]
description = """
Add a function `parse_version(s: &str) -> Result<(u32, u32, u32),
  ParseError>` to the library. Three tasks coordinate handler, tests,
  and docs.
"""
[workspace]
name = "Api Contract Change"
lane_id     = "api-contract-lane"

[[tasks]]
task_id            = "handler"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["src/"]
description        = "Handler"
prompt             = """
  In src/lib.rs add `pub fn parse_version(s: &str) -> Result<(u32,
  u32, u32), ParseError>`. Define `pub struct ParseError` with a
  Display impl. Run `cargo build` to verify, then commit.
"""

[[tasks]]
task_id            = "tests"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["tests/"]
predecessors       = ["handler"]
description        = "Add version parser tests"
prompt             = """
  Add tests/version_test.rs covering: valid "1.2.3", missing field,
  non-numeric. Run `cargo test --tests`. Commit on green.
"""

[[tasks]]
task_id            = "docs"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["docs/"]
predecessors       = ["handler"]
description        = "Docs"
prompt             = """
  Add docs/version.md describing the format and listing the error
  cases.
"""

[orchestrator]
cross_cutting_artifacts = ["Cargo.lock"]
