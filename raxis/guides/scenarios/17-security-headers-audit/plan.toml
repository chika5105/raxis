# Scenario 17 — security headers audit (Reviewer only).

[plan.initiative]
description = """
Security headers audit (scenario 17)
"""
[workspace]
name = "Security Headers Audit"
lane_id     = "secaudit-lane"
repository  = "main"
target_ref  = "refs/heads/main"

[[tasks]]
task_name            = "audit"
session_agent_type = "Reviewer"
clone_strategy     = "blobless"
path_allowlist     = ["audits/"]
description        = "Audit"
prompt             = """
  Read server/nginx.conf and produce audits/headers-audit.md. The
  report should list each well-known security header (CSP,
  X-Content-Type-Options, X-Frame-Options, Referrer-Policy,
  Strict-Transport-Security, Permissions-Policy) and mark each as
  `Present` or `Missing`. Commit and submit a Reject decision if any
  are Missing.
"""
