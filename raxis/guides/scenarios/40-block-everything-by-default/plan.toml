# Scenario 40 — default-deny posture.

[plan.initiative]
description = """
Block everything by default (scenario 40)
"""
[workspace]
name = "Block Everything By Default"
lane_id     = "default-deny-lane"
repository  = "main"
target_ref  = "refs/heads/main"

[[tasks]]
task_id            = "try-egress"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["src/"]
description        = "Try Egress"
prompt             = """
  Try to fetch https://1.1.1.1 via curl. The kernel is configured to
  deny that egress. Document in src/main.rs the *outcome* (the
  audit-recorded denial code).
"""
