# Scenario 14 — DB migration then app change.

[plan.initiative]
description = """
Add `display_name` column then surface it in src/users.py.
"""
[workspace]
name = "Db Migration And App Change"
lane_id     = "db-migration-lane"

[[tasks]]
task_id            = "migration"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["migrations/"]
description        = "Migration"
prompt             = """
  Add migrations/002_add_display_name.sql adding a TEXT column
  `display_name` to `users`. Use `ALTER TABLE`. Commit.
"""

[[tasks]]
task_id            = "app"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["src/"]
predecessors       = ["migration"]
description        = "App"
prompt             = """
  Update src/users.py: add `get_display_name(user)` returning the
  display_name field. Commit.
"""
