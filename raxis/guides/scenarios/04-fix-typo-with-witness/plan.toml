# Scenario 04 — Fix a typo with a cargo-build witness.

[plan.initiative]
description = """
The fixer Executor restores `pub fn add(...)` in src/lib.rs; the
  cargo_build verifier confirms the build succeeds before the merge
  is allowed to advance main.
"""
[workspace]
name = "Fix Typo With Witness"
lane_id     = "fix-typo-lane"
repository  = "main"
target_ref  = "refs/heads/main"

[[tasks]]
task_id            = "fixer"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["src/"]
predecessors       = []
description = "cargo_build"
prompt             = """
  src/lib.rs has a typo: `pub fn ad(...)` should be `pub fn add(...)`.
  Restore the correct function name. Do not change the signature, the
  body, or the test. Commit with the message "scenario 04: fix typo"
  and submit CompleteTask.
"""

# ── Per-task verifier ──────────────────────────────────────────────────────
# Runs `cargo build` inside a verifier subprocess against the
# Executor's terminal commit. final_status must be "passed" or the
# merge fails closed with FAIL_INSUFFICIENT_WITNESS.
[[tasks.verifiers]]
name        = "cargo_build"
image       = "raxis-verifier-rust-starter"
command     = "cargo build --release --locked"
timeout     = "3m"
on_failure  = "block_review"

[orchestrator]
cross_cutting_artifacts = []
