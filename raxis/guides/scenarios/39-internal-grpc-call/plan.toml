# Scenario 39 — internal gRPC call.

[plan.initiative]
description = """
Internal grpc call (scenario 39)
"""
[workspace]
name = "Internal Grpc Call"
lane_id     = "grpc-lane"
repository  = "main"
target_ref  = "refs/heads/main"

[[tasks]]
task_name            = "ping"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["data/"]
allowed_egress     = ["internal.example.com:443"]
description        = "Ping"
prompt             = """
  Invoke internal.example.com:443/myservice.PingService/Ping using
  grpcurl. Save the response to data/ping.json.
"""
