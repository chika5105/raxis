# Scenario 36 — Postgres credential proxy.

[plan.initiative]
description = """
Postgres credential proxy (scenario 36)
"""
[workspace]
name = "Postgres Credential Proxy"
lane_id     = "pg-cred-lane"
repository  = "main"
target_ref  = "refs/heads/main"

[[tasks]]
task_id            = "query-users"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["src/"]
description = "db_main"
prompt             = """
  Use psql connecting via the credential proxy to query SELECT 1 +
  1. Print the result. Do NOT log or write the connection string.
"""

[[tasks.credentials]]
name           = "db_main"
kind           = "postgres"
egress_allowed = false
