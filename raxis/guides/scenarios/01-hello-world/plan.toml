# Scenario 01 — Hello World plan.
#
# The smallest possible RAXIS plan that does real work: one Executor,
# no Reviewer, no merge gate. Use this as a sanity check that your
# install is correctly wired (kernel + gateway + operator key + provider
# credentials).
#
# Validate locally:
#   raxis plan validate ./plan.toml
#
# Then:
#   INIT_ID="$(raxis submit plan ./plan.toml --no-dry-run | awk '/^Initiative / {print $2} /^initiative_id:/ {print $2}')"
#   raxis plan approve "$INIT_ID"

[plan.initiative]
description = """
The greeter task writes a small markdown file (HELLO.md) at the
  repository root and commits it. No Reviewer; no merge gate; the
  initiative completes the moment the Executor's CompleteTask is
  accepted.
"""
[workspace]
name = "Hello World"
lane_id     = "hello-world-lane"

# ── Greeter ───────────────────────────────────────────────────────────────────
# `clone_strategy = "blobless"` is the V2 default. `path_allowlist = ["./"]`
# permits the Executor to touch every file at the repo root (we only
# need HELLO.md for this scenario, but a leading `./` is the canonical
# "everything" expression).
[[tasks]]
task_id            = "greeter"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["./"]
predecessors       = []
description        = "Greeter"
prompt             = """
  Create a file called HELLO.md at the repository root containing a
  cheerful one-line greeting. Commit it with the message "scenario 01:
  hello world". Then submit CompleteTask. Do not modify any other
  file.
"""
