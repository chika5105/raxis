# Scenario template credential.toml.
#
# This file is a PLACEHOLDER. Do NOT commit real secrets. Each `REPLACE_ME`
# below is a value you fill in **locally** to run the scenario.
#
# Where the kernel reads from
# ───────────────────────────
# Each provider/credential listed in policy.toml's [[providers.entries]]
# resolves to a file at:
#
#   $RAXIS_DATA_DIR/providers/<credentials filename>
#
# That file MUST be mode 0600 — the FileCredentialBackend rejects any
# other mode at boot (BOOT_ERR_CREDENTIAL_MODE).
#
# Install
# ───────
# Copy the relevant snippet below to the matching path under
# $RAXIS_DATA_DIR/providers/, replacing every REPLACE_ME with a real
# value.

# ── Anthropic ─────────────────────────────────────────────────────────────
# Path: $RAXIS_DATA_DIR/providers/anthropic-prod.toml
# api_key = "sk-ant-REPLACE_ME"

# ── OpenAI ────────────────────────────────────────────────────────────────
# Path: $RAXIS_DATA_DIR/providers/openai-prod.toml
# api_key = "sk-REPLACE_ME"

# ── PostgreSQL (credential proxy) ─────────────────────────────────────────
# Path: $RAXIS_DATA_DIR/credentials/postgres-app.toml
# host     = "127.0.0.1"
# port     = 5432
# database = "raxis_demo"
# username = "raxis_demo"
# password = "REPLACE_ME"

# ── S3 (credential proxy) ─────────────────────────────────────────────────
# Path: $RAXIS_DATA_DIR/credentials/s3-uploads.toml
# access_key_id     = "AKIAREPLACE_ME"
# secret_access_key = "REPLACE_ME"
# region            = "us-east-1"
# bucket            = "raxis-demo-uploads"
