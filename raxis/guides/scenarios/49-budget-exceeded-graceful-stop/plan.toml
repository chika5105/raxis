# Scenario 49 — under-budget initiative.

[plan.initiative]
description = """
Budget exceeded graceful stop (scenario 49)
"""
[workspace]
name = "Budget Exceeded Graceful Stop"
lane_id     = "tiny-budget-lane"
repository  = "main"
target_ref  = "refs/heads/main"

[budget]
max_tokens          = 500
max_wall_clock_secs = 60

[[tasks]]
task_name            = "verbose-task"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["docs/"]
description        = "Verbose Task"
prompt             = """
Write a 5,000-word essay on monad transformers in docs/essay.md.
"""