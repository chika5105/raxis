# Scenario 38 — Stripe API call.

[plan.initiative]
description = """
Stripe api call (scenario 38)
"""
[workspace]
name = "Stripe Api Call"
lane_id     = "stripe-api-lane"

[[tasks]]
task_id            = "create-customer"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["data/"]
allowed_egress     = ["api.stripe.com:443"]
description = "stripe_test"
prompt             = """
  POST to https://api.stripe.com/v1/customers with
  email=test+raxis@example.com. Save the response JSON to
  data/customer.json.
"""

[[tasks.credentials]]
name           = "stripe_test"
kind           = "http_bearer"
egress_allowed = false
