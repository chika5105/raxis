# Scenario 03 — Add a README section.

[plan.initiative]
description = """
The documenter Executor adds a new top-level section "## Quickstart"
  to the repo's README.md. The path_allowlist is intentionally exact
  (just README.md) so any wander-off triggers FAIL_PATH_POLICY_VIOLATION.
"""
[workspace]
name = "Add Readme Section"
lane_id     = "readme-edit-lane"

[[tasks]]
task_id            = "documenter"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["README.md"]
predecessors       = []
description        = "Documenter"## Quickstart\" to README.md, AFTER"
prompt             = """
  Add a new top-level section titled "## Quickstart" to README.md, AFTER
  any existing top-level sections, with three numbered steps explaining
  how a fresh user clones, builds, and runs this demo repo. Do not
  modify the existing sections. Commit with message "scenario 03: add
  Quickstart section" and submit CompleteTask.
"""

[orchestrator]
cross_cutting_artifacts = []
