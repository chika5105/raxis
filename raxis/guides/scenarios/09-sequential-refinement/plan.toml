# Scenario 09 — Sequential refinement.

[plan.initiative]
description = """
draft writes a rough docs/spec.md; refine adds structure and
  examples; polish proofreads and fixes prose.
"""
[workspace]
name        = "Sequential refinement"
lane_id     = "seq-refine-lane"

[[tasks]]
task_id            = "draft"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["docs/"]
predecessors       = []
description = """
  Write docs/spec.md as a rough first draft of an API spec for a
  small "key-value cache" library. Cover: get(key), put(key, value,
  ttl), delete(key). 200-300 words. Commit and submit CompleteTask.
"""

[[tasks]]
task_id            = "refine"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["docs/"]
predecessors       = ["draft"]
description = """
  Refine docs/spec.md by adding: section headings, a code-example
  block showing each function call, and a separate "Errors" section.
  Preserve the original semantic intent; do not rewrite from scratch.
"""

[[tasks]]
task_id            = "polish"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["docs/"]
predecessors       = ["refine"]
description = """
  Polish docs/spec.md: fix grammar, tighten word choice, ensure each
  paragraph has a topic sentence. Do not change the structure or
  examples. Commit and submit CompleteTask.
"""

[orchestrator]
cross_cutting_artifacts = []
