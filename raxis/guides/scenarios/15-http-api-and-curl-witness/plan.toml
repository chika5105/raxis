# Scenario 15 — HTTP API + curl mechanical witness.

[plan.initiative]
description = """
Http api and curl witness (scenario 15)
"""
[workspace]
name = "Http Api And Curl Witness"
lane_id     = "http-api-curl-lane"

[[tasks]]
task_id            = "build"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["src/"]
description        = "Build"
prompt             = """
  In src/main.rs, write a small HTTP server using `tiny_http` that
  listens on 127.0.0.1:7878 and responds to GET / with body
  `{"ok":true}` and content-type application/json. Run `cargo build`
  to verify; commit.
"""

[[tasks.witnesses]]
kind = "Mechanical"
command = [
  "sh",
  "-c",
  """\
cargo build --release && \
(./target/release/demo15 &) && \
sleep 1 && \
curl -fsS http://127.0.0.1:7878/ | grep -q '\"ok\":true' && \
pkill -f demo15\
""",
]
exit_code_eq = 0

[orchestrator]
cross_cutting_artifacts = ["Cargo.lock"]
