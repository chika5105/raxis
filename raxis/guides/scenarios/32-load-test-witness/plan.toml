# Scenario 32 — load-test mechanical witness.

[plan.initiative]
description = """
Load test witness (scenario 32)
"""
[workspace]
name = "Load Test Witness"
lane_id     = "loadtest-lane"
repository  = "main"
target_ref  = "refs/heads/main"

[[tasks]]
task_id            = "build"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["src/"]
description        = "Build"
prompt             = """
  Build a tiny HTTP server (tiny_http) on 127.0.0.1:7878 returning
  {"ok":true} for any GET. Run cargo build to verify; commit.
"""

[[tasks.witnesses]]
kind = "Mechanical"
command = ["sh", "-c", """
  cargo build --release --quiet \
    && (./target/release/demo32 &) && sleep 1 \
    && hey -z 5s -c 10 http://127.0.0.1:7878/ > /tmp/loadout.txt \
    && pkill -f demo32 \
    && grep -E 'p99' /tmp/loadout.txt
"""]
exit_code_eq      = 0
wall_clock_seconds = 30

[orchestrator]
cross_cutting_artifacts = ["Cargo.lock"]
