# Scenario 22 — reject-then-pass loop.

[workspace]
name        = "Reject then pass"
lane_id     = "reject-pass-lane"
description = "Reviewer rejects round 1, accepts round 2."

[[tasks]]
task_id            = "implement"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["src/"]
max_revision_rounds = 3
context = """
  Add a function `pub fn greet(name: &str) -> String` to src/main.rs
  returning "Hello, NAME!". On the FIRST commit, intentionally use
  format! without escaping (the reviewer will reject). On the
  retry, switch to a bytes-safe variant using a manual concatenation
  approach.
"""

[[tasks]]
task_id            = "review"
session_agent_type = "Reviewer"
clone_strategy     = "blobless"
predecessors       = ["implement"]
context = """
  Inspect implement's commit. If `format!` is used, Reject with
  reason "use bytes-safe concatenation". Otherwise Accept.
"""
