# Scenario 11 — Generate Docs From Source.

[plan.initiative]
description = """
Read src/lib.rs and produce docs/api.md.
"""
[workspace]
name = "Generate Docs From Source"
lane_id     = "doc-gen-lane"
repository  = "main"
target_ref  = "refs/heads/main"

[[tasks]]
task_id            = "docgen"
session_agent_type = "Executor"
clone_strategy     = "blobless"
path_allowlist     = ["docs/"]
description        = "Docgen"
prompt             = """
  Read src/lib.rs (read-only) and write docs/api.md describing each
  public function with a one-line description and a code example.
  Commit and submit CompleteTask. Do not modify any file outside
  docs/.
"""
