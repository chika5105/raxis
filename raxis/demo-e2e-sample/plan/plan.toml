# RAXIS V2 sample plan for the manual end-to-end demo.
#
# After running `setup.sh`, sign and submit:
#   raxis plan sign   plan.toml --key <operator.pem>
#   raxis plan submit plan.toml
#
# The kernel reads `[plan.initiative].description` as the orchestrator
# seed prompt and `[[tasks]].description` as each Executor / Reviewer
# seed prompt. Both fields are REQUIRED.

[meta]
version = 1

[plan.initiative]
description = """
Add a /healthz endpoint to the demo service. Wire it into the existing HTTP
router, return a JSON `{ "status": "ok" }` body with HTTP 200, and add an
integration test that exercises the new route end-to-end.
"""

[workspace]
lane_id    = "main"
target_ref = "refs/heads/main"

[[tasks]]
task_id            = "implement_healthz"
name               = "Implement /healthz route"
description        = """
Add the /healthz route to the existing HTTP router. The handler returns
HTTP 200 with the JSON body `{ "status": "ok" }`. Keep the change scoped
to the router module and its sibling tests; do not touch unrelated handlers.
"""
session_agent_type = "Executor"
clone_strategy     = "blobless"

[[tasks]]
task_id            = "review_healthz"
name               = "Review /healthz route"
description        = """
Review the implementation produced by `implement_healthz`. Confirm the
route is registered, the response body matches `{ "status": "ok" }`, and
the new integration test exercises the new route end-to-end.
"""
session_agent_type = "Reviewer"
predecessors       = ["implement_healthz"]
