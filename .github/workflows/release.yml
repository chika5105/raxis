# Tag-driven signed release pipeline.
#
# Normative reference: raxis/specs/v2/release-and-distribution.md §5
# ("Release pipeline (GitHub Actions)").
#
# Triggers ONLY on a tag push matching v[0-9]+.[0-9]+.[0-9]+* — a
# contributor sending a PR cannot reach this workflow. The release
# secrets listed below are exposed exclusively to this workflow.
#
# Pipeline shape (pinned by the spec):
#
#   fallback-digests → build-darwin → notarize → publish → tap
#                 ↘    build-linux                 ↗
#
# Guest runtime bundles are staged from repository-variable URLs and
# verified by SHA-256 before any release tarball is created. The
# `fallback-digests` job remains only for the legacy V1 digest constants;
# V2 image integrity comes from signed manifests verified by the kernel's
# compiled-in Ed25519 trust anchor.
#
# Release-secret layout (release-and-distribution.md §5.3):
#
#   RAXIS_KERNEL_SIGNING_KEY_HEX                   (kernel build)
#   RAXIS_KERNEL_SIGNING_KEY_PRIV_HEX              (guest-bundle builder)
#   APPLE_DEVELOPER_ID_APPLICATION_P12             (notarize.sh)
#   APPLE_DEVELOPER_ID_APPLICATION_PASSWORD        (notarize.sh)
#   APPLE_NOTARIZATION_API_KEY_ID                  (notarize.sh)
#   APPLE_NOTARIZATION_API_KEY_ISSUER_ID           (notarize.sh)
#   APPLE_NOTARIZATION_API_KEY_P8                  (notarize.sh)
#   HOMEBREW_TAP_DEPLOY_KEY                        (publish)
#
# Required repository variables (not secrets):
#
#   RAXIS_GUEST_BUNDLE_ARM64_URL
#   RAXIS_GUEST_BUNDLE_ARM64_SHA256
#   RAXIS_GUEST_BUNDLE_X86_64_URL
#   RAXIS_GUEST_BUNDLE_X86_64_SHA256
#   HOMEBREW_TAP_REPOSITORY                        (default: chika5105/homebrew-raxis)
#
# Note: the kernel signing keypair is split. The public half (HEX)
# reaches the host-kernel build. The private half signs guest image
# manifests before they are packed into the guest runtime bundles.

name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# Release token must be able to upload assets to GitHub Releases.
# Everything else stays read-only.
permissions:
  contents: write

# Don't run two releases concurrently for the same tag — the tap
# update is destination-truth, races would produce inconsistent
# state.
concurrency:
  group:               release-${{ github.ref }}
  cancel-in-progress:  false

env:
  RAXIS_VERSION: ${{ github.ref_name }}
  HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY || 'chika5105/homebrew-raxis' }}

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1: legacy fallback image digest placeholders.
  #
  # V2 releases ship complete guest runtime bundles (`images/` plus
  # `kernel/`) as part of each platform tarball. Those bundles are
  # staged from repository-variable URLs and verified by SHA-256 in the
  # host build jobs below. This job only feeds the legacy digest env vars
  # consumed by `raxis-canonical-images/build.rs`.
  # ────────────────────────────────────────────────────────────
  build-images:
    name:    compute legacy fallback digests
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: raxis
    outputs:
      reviewer_digest_hex:     ${{ steps.compute.outputs.reviewer_digest_hex }}
      orchestrator_digest_hex: ${{ steps.compute.outputs.orchestrator_digest_hex }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: raxis -> target

      # Build raxis-image-builder. Using --release gives the same
      # compiler optimisation level the production binary will see;
      # determinism is unaffected.
      - name: build raxis-image-builder
        run:  cargo build --release -p raxis-image-builder

      # Compute the per-role image digests. Today this is a SHA-256
      # over the placeholder image bytes that ship with the
      # repository's own canonical-images fixtures; in the
      # follow-up it will be a SHA-256 over the real
      # mkfs.erofs-built rootfs.img. Either way the wire shape
      # (job-output hex strings) is the contract the kernel build
      # downstream consumes.
      - name: compute role image digests
        id:   compute
        run: |
          set -euo pipefail
          # TODO(release-and-distribution.md §11): replace with the
          # real mkfs.erofs build of crates/canonical-images/{reviewer,
          # orchestrator}-core-rootfs.toml when the producer side
          # lands. Until then we surface the placeholder digests
          # explicitly so the kernel-binary downstream contract
          # remains honest.
          REVIEWER_DIGEST=$(printf '%64s' 0 | tr ' ' '0')
          ORCH_DIGEST=$(printf    '%64s' 0 | tr ' ' '0')
          echo "reviewer_digest_hex=${REVIEWER_DIGEST}"     | tee -a "$GITHUB_OUTPUT"
          echo "orchestrator_digest_hex=${ORCH_DIGEST}"     | tee -a "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────
  # Stage 2 — Linux binaries.
  # ────────────────────────────────────────────────────────────
  build-linux:
    name:    build linux-${{ matrix.arch }}
    needs:   [build-images]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch:   x86_64
            target: x86_64-unknown-linux-gnu
            guest_key: X86_64
          - arch:   arm64
            target: aarch64-unknown-linux-gnu
            guest_key: ARM64
    defaults:
      run:
        working-directory: raxis
    env:
      RAXIS_KERNEL_SIGNING_KEY_HEX:               ${{ secrets.RAXIS_KERNEL_SIGNING_KEY_HEX }}
      RAXIS_EXPECTED_REVIEWER_IMAGE_DIGEST_HEX:    ${{ needs.build-images.outputs.reviewer_digest_hex }}
      RAXIS_EXPECTED_ORCHESTRATOR_IMAGE_DIGEST_HEX: ${{ needs.build-images.outputs.orchestrator_digest_hex }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: raxis -> target

      - name: install cross toolchain (arm64 only)
        if:   matrix.arch == 'arm64'
        run:  sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: cargo build --release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            -p raxis-kernel \
            -p raxis-cli \
            -p raxis-planner-orchestrator \
            -p raxis-planner-executor \
            -p raxis-planner-reviewer \
            -p raxis-tproxy

      # Stage the bin/ layout.
      - name: stage bin layout
        run: |
          set -euo pipefail
          outdir="out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}"
          mkdir -p "${outdir}/bin" "${outdir}/share/raxis"
          cp target/${{ matrix.target }}/release/raxis "${outdir}/bin/raxis-cli"
          cp target/${{ matrix.target }}/release/raxis "${outdir}/bin/raxis"
          cp target/${{ matrix.target }}/release/raxis-kernel "${outdir}/bin/raxis-kernel"
          cp target/${{ matrix.target }}/release/raxis-orchestrator "${outdir}/bin/raxis-orchestrator"
          cp target/${{ matrix.target }}/release/raxis-executor "${outdir}/bin/raxis-executor"
          cp target/${{ matrix.target }}/release/raxis-reviewer "${outdir}/bin/raxis-reviewer"
          cp target/${{ matrix.target }}/release/raxis-tproxy "${outdir}/bin/raxis-tproxy"
          cat > "${outdir}/share/raxis/policy.toml.example" <<'EOF'
          # RAXIS operator policy example.
          # Copy this file to policy.toml and run `raxis genesis`.
          EOF

      - name: stage guest runtime bundle
        env:
          GUEST_BUNDLE_URL: ${{ vars[format('RAXIS_GUEST_BUNDLE_{0}_URL', matrix.guest_key)] }}
          GUEST_BUNDLE_SHA256: ${{ vars[format('RAXIS_GUEST_BUNDLE_{0}_SHA256', matrix.guest_key)] }}
        run: |
          set -euo pipefail
          outdir="out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}"
          if [[ -z "${GUEST_BUNDLE_URL:-}" || -z "${GUEST_BUNDLE_SHA256:-}" ]]; then
            echo "::error::missing RAXIS_GUEST_BUNDLE_${{ matrix.guest_key }}_{URL,SHA256} repository variables"
            exit 78
          fi
          curl -fsSL "${GUEST_BUNDLE_URL}" -o /tmp/raxis-guest-runtime.tar.gz
          actual="$(shasum -a 256 /tmp/raxis-guest-runtime.tar.gz | awk '{print $1}')"
          if [[ "${actual}" != "${GUEST_BUNDLE_SHA256}" ]]; then
            echo "::error::guest runtime bundle SHA mismatch: expected ${GUEST_BUNDLE_SHA256}, got ${actual}"
            exit 65
          fi
          tar -xzf /tmp/raxis-guest-runtime.tar.gz -C "${outdir}"
          test -f "${outdir}/kernel/vmlinux"
          test -f "${outdir}/kernel/vmlinux.config"
          test -d "${outdir}/images"
          test -n "$(find "${outdir}/images" -maxdepth 1 -name 'raxis-*.img' -print -quit)"

      - name: tarball
        run: |
          tar -C out -czf out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}.tar.gz \
              raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}
          path: raxis/out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}.tar.gz

  # ────────────────────────────────────────────────────────────
  # Stage 2 — macOS binaries.
  # ────────────────────────────────────────────────────────────
  build-darwin:
    name:    build darwin-${{ matrix.arch }}
    needs:   [build-images]
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch:   arm64
            target: aarch64-apple-darwin
            guest_key: ARM64
          - arch:   x86_64
            target: x86_64-apple-darwin
            guest_key: X86_64
    defaults:
      run:
        working-directory: raxis
    env:
      RAXIS_KERNEL_SIGNING_KEY_HEX:                 ${{ secrets.RAXIS_KERNEL_SIGNING_KEY_HEX }}
      RAXIS_EXPECTED_REVIEWER_IMAGE_DIGEST_HEX:     ${{ needs.build-images.outputs.reviewer_digest_hex }}
      RAXIS_EXPECTED_ORCHESTRATOR_IMAGE_DIGEST_HEX: ${{ needs.build-images.outputs.orchestrator_digest_hex }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: raxis -> target

      - name: cargo build --release
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            -p raxis-kernel \
            -p raxis-cli \
            -p raxis-planner-orchestrator \
            -p raxis-planner-executor \
            -p raxis-planner-reviewer

      # macOS does not ship raxis-tproxy as a real binary (Linux
      # nfqueue is required). The formula expects bin/raxis-tproxy
      # to exist regardless; we land a tiny stub script that
      # exits 70 on invocation.
      - name: stage bin layout
        run: |
          set -euo pipefail
          outdir="out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}"
          mkdir -p "${outdir}/bin" "${outdir}/share/raxis"
          cp target/${{ matrix.target }}/release/raxis "${outdir}/bin/raxis-cli"
          cp target/${{ matrix.target }}/release/raxis "${outdir}/bin/raxis"
          cp target/${{ matrix.target }}/release/raxis-kernel "${outdir}/bin/raxis-kernel"
          cp target/${{ matrix.target }}/release/raxis-orchestrator "${outdir}/bin/raxis-orchestrator"
          cp target/${{ matrix.target }}/release/raxis-executor "${outdir}/bin/raxis-executor"
          cp target/${{ matrix.target }}/release/raxis-reviewer "${outdir}/bin/raxis-reviewer"
          cat > "${outdir}/share/raxis/policy.toml.example" <<'EOF'
          # RAXIS operator policy example.
          # Copy this file to policy.toml and run `raxis genesis`.
          EOF

          # tproxy stub for macOS (release-and-distribution.md §6.3).
          printf '%s\n' \
            '#!/bin/sh' \
            'echo "raxis-tproxy: linux-only; the macOS kernel uses host-routed egress" >&2' \
            'exit 70' > "${outdir}/bin/raxis-tproxy"
          chmod +x "${outdir}/bin/raxis-tproxy"

      - name: stage guest runtime bundle
        env:
          GUEST_BUNDLE_URL: ${{ vars[format('RAXIS_GUEST_BUNDLE_{0}_URL', matrix.guest_key)] }}
          GUEST_BUNDLE_SHA256: ${{ vars[format('RAXIS_GUEST_BUNDLE_{0}_SHA256', matrix.guest_key)] }}
        run: |
          set -euo pipefail
          outdir="out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}"
          if [[ -z "${GUEST_BUNDLE_URL:-}" || -z "${GUEST_BUNDLE_SHA256:-}" ]]; then
            echo "::error::missing RAXIS_GUEST_BUNDLE_${{ matrix.guest_key }}_{URL,SHA256} repository variables"
            exit 78
          fi
          curl -fsSL "${GUEST_BUNDLE_URL}" -o /tmp/raxis-guest-runtime.tar.gz
          actual="$(shasum -a 256 /tmp/raxis-guest-runtime.tar.gz | awk '{print $1}')"
          if [[ "${actual}" != "${GUEST_BUNDLE_SHA256}" ]]; then
            echo "::error::guest runtime bundle SHA mismatch: expected ${GUEST_BUNDLE_SHA256}, got ${actual}"
            exit 65
          fi
          tar -xzf /tmp/raxis-guest-runtime.tar.gz -C "${outdir}"
          test -f "${outdir}/kernel/vmlinux"
          test -f "${outdir}/kernel/vmlinux.config"
          test -d "${outdir}/images"
          test -n "$(find "${outdir}/images" -maxdepth 1 -name 'raxis-*.img' -print -quit)"

      - uses: actions/upload-artifact@v4
        with:
          name: raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}-unsigned
          path: raxis/out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/

  # ────────────────────────────────────────────────────────────
  # Stage 3 — codesign + notarize the macOS binaries.
  # ────────────────────────────────────────────────────────────
  notarize:
    name:    notarize darwin-${{ matrix.arch }}
    needs:   [build-darwin]
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    env:
      APPLE_DEVELOPER_ID_APPLICATION_P12:        ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12 }}
      APPLE_DEVELOPER_ID_APPLICATION_PASSWORD:   ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_PASSWORD }}
      APPLE_NOTARIZATION_API_KEY_ID:             ${{ secrets.APPLE_NOTARIZATION_API_KEY_ID }}
      APPLE_NOTARIZATION_API_KEY_ISSUER_ID:      ${{ secrets.APPLE_NOTARIZATION_API_KEY_ISSUER_ID }}
      APPLE_NOTARIZATION_API_KEY_P8:             ${{ secrets.APPLE_NOTARIZATION_API_KEY_P8 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}-unsigned
          path: out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/

      - name: notarize
        run: raxis/release/scripts/notarize.sh out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/bin

      - name: tarball
        run: |
          tar -C out -czf raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}.tar.gz \
              raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}
          path: raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}.tar.gz

  # ────────────────────────────────────────────────────────────
  # Stage 4 — collect every artefact, compute sha256s, render
  # formulas, upload to GitHub Releases, force-push the tap.
  # ────────────────────────────────────────────────────────────
  publish:
    name:    publish release
    needs:   [build-linux, notarize]
    runs-on: ubuntu-22.04
    env:
      HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/raxis-${{ env.RAXIS_VERSION }}-linux-x86_64/raxis-${{ env.RAXIS_VERSION }}-linux-x86_64.tar.gz
            artifacts/raxis-${{ env.RAXIS_VERSION }}-linux-arm64/raxis-${{ env.RAXIS_VERSION }}-linux-arm64.tar.gz
            artifacts/raxis-${{ env.RAXIS_VERSION }}-darwin-arm64/raxis-${{ env.RAXIS_VERSION }}-darwin-arm64.tar.gz
            artifacts/raxis-${{ env.RAXIS_VERSION }}-darwin-x86_64/raxis-${{ env.RAXIS_VERSION }}-darwin-x86_64.tar.gz

      - name: render Homebrew formula
        run: |
          set -euo pipefail
          base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RAXIS_VERSION}"
          export RAXIS_DARWIN_ARM64_URL="${base_url}/raxis-${RAXIS_VERSION}-darwin-arm64.tar.gz"
          export RAXIS_DARWIN_X86_64_URL="${base_url}/raxis-${RAXIS_VERSION}-darwin-x86_64.tar.gz"
          export RAXIS_LINUX_ARM64_URL="${base_url}/raxis-${RAXIS_VERSION}-linux-arm64.tar.gz"
          export RAXIS_LINUX_X86_64_URL="${base_url}/raxis-${RAXIS_VERSION}-linux-x86_64.tar.gz"
          export RAXIS_DARWIN_ARM64_SHA256="$(shasum -a 256 artifacts/raxis-${RAXIS_VERSION}-darwin-arm64/raxis-${RAXIS_VERSION}-darwin-arm64.tar.gz | awk '{print $1}')"
          export RAXIS_DARWIN_X86_64_SHA256="$(shasum -a 256 artifacts/raxis-${RAXIS_VERSION}-darwin-x86_64/raxis-${RAXIS_VERSION}-darwin-x86_64.tar.gz | awk '{print $1}')"
          export RAXIS_LINUX_ARM64_SHA256="$(shasum -a 256 artifacts/raxis-${RAXIS_VERSION}-linux-arm64/raxis-${RAXIS_VERSION}-linux-arm64.tar.gz | awk '{print $1}')"
          export RAXIS_LINUX_X86_64_SHA256="$(shasum -a 256 artifacts/raxis-${RAXIS_VERSION}-linux-x86_64/raxis-${RAXIS_VERSION}-linux-x86_64.tar.gz | awk '{print $1}')"
          export RAXIS_VERSION="${RAXIS_VERSION#v}"
          mkdir -p rendered/Formula
          raxis/release/scripts/render-formula.sh raxis > rendered/Formula/raxis.rb

      - name: push Homebrew tap
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_DEPLOY_KEY:-}" ]]; then
            echo "::error::HOMEBREW_TAP_DEPLOY_KEY is required to update the Homebrew tap"
            exit 78
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "${HOMEBREW_TAP_DEPLOY_KEY}" > ~/.ssh/raxis-homebrew-tap
          chmod 600 ~/.ssh/raxis-homebrew-tap
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          GIT_SSH_COMMAND="ssh -i ~/.ssh/raxis-homebrew-tap -o IdentitiesOnly=yes" \
            git clone "git@github.com:${HOMEBREW_TAP_REPOSITORY}.git" tap
          mkdir -p tap/Formula
          cp rendered/Formula/raxis.rb tap/Formula/raxis.rb
          git -C tap config user.name "raxis-release-bot"
          git -C tap config user.email "release-bot@raxis.io"
          git -C tap add Formula/raxis.rb
          if git -C tap diff --cached --quiet; then
            echo "Homebrew tap already up to date"
            exit 0
          fi
          git -C tap commit -m "Update raxis ${RAXIS_VERSION}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/raxis-homebrew-tap -o IdentitiesOnly=yes" \
            git -C tap push origin HEAD
