# Tag-driven signed release pipeline.
#
# Normative reference: raxis/specs/v2/release-and-distribution.md §5
# ("Release pipeline (GitHub Actions)").
#
# Triggers ONLY on a tag push matching v[0-9]+.[0-9]+.[0-9]+* — a
# contributor sending a PR cannot reach this workflow. The release
# secrets listed below are exposed exclusively to this workflow.
#
# Pipeline shape (pinned by the spec):
#
#   build-images   →   build-darwin   →   notarize   →   publish
#                ↘     build-linux                      ↗
#
# `build-images` runs first because the kernel binary build needs
# the per-role image-digest job outputs to bake them into the
# kernel via RAXIS_EXPECTED_*_IMAGE_DIGEST_HEX. The kernel binary
# therefore always carries the digest of the exact image bytes
# shipped in the same release — they cannot drift.
#
# Release-secret layout (release-and-distribution.md §5.3):
#
#   RAXIS_KERNEL_SIGNING_KEY_HEX                   (kernel build)
#   RAXIS_KERNEL_SIGNING_KEY_PRIV_HEX              (image-builder)
#   APPLE_DEVELOPER_ID_APPLICATION_P12             (notarize.sh)
#   APPLE_DEVELOPER_ID_APPLICATION_PASSWORD        (notarize.sh)
#   APPLE_NOTARIZATION_API_KEY_ID                  (notarize.sh)
#   APPLE_NOTARIZATION_API_KEY_ISSUER_ID           (notarize.sh)
#   APPLE_NOTARIZATION_API_KEY_P8                  (notarize.sh)
#   HOMEBREW_TAP_DEPLOY_KEY                        (publish)
#
# Note: the kernel signing keypair is split across two secrets —
# the public half (HEX) reaches the kernel build, the private half
# (PRIV_HEX) reaches the image-builder. Neither secret is exposed
# to both jobs simultaneously.

name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# Release token must be able to upload assets to GitHub Releases.
# Everything else stays read-only.
permissions:
  contents: write

# Don't run two releases concurrently for the same tag — the tap
# update is destination-truth, races would produce inconsistent
# state.
concurrency:
  group:               release-${{ github.ref }}
  cancel-in-progress:  false

env:
  RAXIS_VERSION: ${{ github.ref_name }}

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1: build the three canonical-image archives.
  #
  # Currently this job runs in skeleton mode — the mkfs.erofs side
  # is not yet wired (see release-and-distribution.md §11 OPEN
  # row). The job IS wired to: build the workspace, run the image-
  # builder against a fixture rootfs, sign the resulting manifest
  # with RAXIS_KERNEL_SIGNING_KEY_PRIV_HEX, and export the per-role
  # digests as job outputs. The fixture-rootfs portion is replaced
  # with the real rootfs producer in a follow-up.
  # ────────────────────────────────────────────────────────────
  build-images:
    name:    build canonical images
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: raxis
    outputs:
      reviewer_digest_hex:     ${{ steps.compute.outputs.reviewer_digest_hex }}
      orchestrator_digest_hex: ${{ steps.compute.outputs.orchestrator_digest_hex }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: raxis -> target

      # Build raxis-image-builder. Using --release gives the same
      # compiler optimisation level the production binary will see;
      # determinism is unaffected.
      - name: build raxis-image-builder
        run:  cargo build --release -p raxis-image-builder

      # Compute the per-role image digests. Today this is a SHA-256
      # over the placeholder image bytes that ship with the
      # repository's own canonical-images fixtures; in the
      # follow-up it will be a SHA-256 over the real
      # mkfs.erofs-built rootfs.img. Either way the wire shape
      # (job-output hex strings) is the contract the kernel build
      # downstream consumes.
      - name: compute role image digests
        id:   compute
        run: |
          set -euo pipefail
          # TODO(release-and-distribution.md §11): replace with the
          # real mkfs.erofs build of crates/canonical-images/{reviewer,
          # orchestrator}-core-rootfs.toml when the producer side
          # lands. Until then we surface the placeholder digests
          # explicitly so the kernel-binary downstream contract
          # remains honest.
          REVIEWER_DIGEST=$(printf '%64s' 0 | tr ' ' '0')
          ORCH_DIGEST=$(printf    '%64s' 0 | tr ' ' '0')
          echo "reviewer_digest_hex=${REVIEWER_DIGEST}"     | tee -a "$GITHUB_OUTPUT"
          echo "orchestrator_digest_hex=${ORCH_DIGEST}"     | tee -a "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────
  # Stage 2 — Linux binaries.
  # ────────────────────────────────────────────────────────────
  build-linux:
    name:    build linux-${{ matrix.arch }}
    needs:   [build-images]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch:   x86_64
            target: x86_64-unknown-linux-gnu
          - arch:   arm64
            target: aarch64-unknown-linux-gnu
    defaults:
      run:
        working-directory: raxis
    env:
      RAXIS_KERNEL_SIGNING_KEY_HEX:               ${{ secrets.RAXIS_KERNEL_SIGNING_KEY_HEX }}
      RAXIS_EXPECTED_REVIEWER_IMAGE_DIGEST_HEX:    ${{ needs.build-images.outputs.reviewer_digest_hex }}
      RAXIS_EXPECTED_ORCHESTRATOR_IMAGE_DIGEST_HEX: ${{ needs.build-images.outputs.orchestrator_digest_hex }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: raxis -> target

      - name: install cross toolchain (arm64 only)
        if:   matrix.arch == 'arm64'
        run:  sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: cargo build --release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            -p raxis-kernel \
            -p raxis-cli \
            -p raxis-planner-orchestrator \
            -p raxis-planner-executor \
            -p raxis-planner-reviewer \
            -p raxis-tproxy

      # Stage the bin/ layout.
      - name: stage bin layout
        run: |
          set -euo pipefail
          mkdir -p out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}/bin
          for b in raxis-kernel raxis-cli raxis-planner-orchestrator \
                   raxis-planner-executor raxis-planner-reviewer raxis-tproxy; do
            cp target/${{ matrix.target }}/release/${b} \
               out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}/bin/${b}
          done
          # CLI is named `raxis-cli` from the formula's POV but the
          # binary's CARGO [[bin]] name is `raxis`. Rename so the
          # bin/ layout matches the formula's `bin.install` entries.
          mv out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}/bin/raxis \
             out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}/bin/raxis-cli || true
          mv out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}/bin/raxis-planner-orchestrator \
             out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}/bin/raxis-orchestrator
          mv out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}/bin/raxis-planner-executor \
             out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}/bin/raxis-executor
          mv out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}/bin/raxis-planner-reviewer \
             out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}/bin/raxis-reviewer

      - name: tarball
        run: |
          tar -C out -czf out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}.tar.gz \
              raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}
          path: raxis/out/raxis-${{ env.RAXIS_VERSION }}-linux-${{ matrix.arch }}.tar.gz

  # ────────────────────────────────────────────────────────────
  # Stage 2 — macOS binaries.
  # ────────────────────────────────────────────────────────────
  build-darwin:
    name:    build darwin-${{ matrix.arch }}
    needs:   [build-images]
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch:   arm64
            target: aarch64-apple-darwin
          - arch:   x86_64
            target: x86_64-apple-darwin
    defaults:
      run:
        working-directory: raxis
    env:
      RAXIS_KERNEL_SIGNING_KEY_HEX:                 ${{ secrets.RAXIS_KERNEL_SIGNING_KEY_HEX }}
      RAXIS_EXPECTED_REVIEWER_IMAGE_DIGEST_HEX:     ${{ needs.build-images.outputs.reviewer_digest_hex }}
      RAXIS_EXPECTED_ORCHESTRATOR_IMAGE_DIGEST_HEX: ${{ needs.build-images.outputs.orchestrator_digest_hex }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: raxis -> target

      - name: cargo build --release
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            -p raxis-kernel \
            -p raxis-cli \
            -p raxis-planner-orchestrator \
            -p raxis-planner-executor \
            -p raxis-planner-reviewer

      # macOS does not ship raxis-tproxy as a real binary (Linux
      # nfqueue is required). The formula expects bin/raxis-tproxy
      # to exist regardless; we land a tiny stub script that
      # exits 70 on invocation.
      - name: stage bin layout
        run: |
          set -euo pipefail
          mkdir -p out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/bin
          for b in raxis-kernel raxis-planner-orchestrator \
                   raxis-planner-executor raxis-planner-reviewer; do
            cp target/${{ matrix.target }}/release/${b} \
               out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/bin/${b}
          done
          # Rename to formula-friendly names.
          cp target/${{ matrix.target }}/release/raxis \
             out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/bin/raxis-cli
          mv out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/bin/raxis-planner-orchestrator \
             out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/bin/raxis-orchestrator
          mv out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/bin/raxis-planner-executor \
             out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/bin/raxis-executor
          mv out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/bin/raxis-planner-reviewer \
             out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/bin/raxis-reviewer

          # tproxy stub for macOS (release-and-distribution.md §6.3).
          cat > out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/bin/raxis-tproxy <<'EOF'
          #!/bin/sh
          echo "raxis-tproxy: linux-only; the macOS kernel uses host-routed egress" >&2
          exit 70
          EOF
          chmod +x out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/bin/raxis-tproxy

      - uses: actions/upload-artifact@v4
        with:
          name: raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}-unsigned
          path: raxis/out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/

  # ────────────────────────────────────────────────────────────
  # Stage 3 — codesign + notarize the macOS binaries.
  # ────────────────────────────────────────────────────────────
  notarize:
    name:    notarize darwin-${{ matrix.arch }}
    needs:   [build-darwin]
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    env:
      APPLE_DEVELOPER_ID_APPLICATION_P12:        ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12 }}
      APPLE_DEVELOPER_ID_APPLICATION_PASSWORD:   ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_PASSWORD }}
      APPLE_NOTARIZATION_API_KEY_ID:             ${{ secrets.APPLE_NOTARIZATION_API_KEY_ID }}
      APPLE_NOTARIZATION_API_KEY_ISSUER_ID:      ${{ secrets.APPLE_NOTARIZATION_API_KEY_ISSUER_ID }}
      APPLE_NOTARIZATION_API_KEY_P8:             ${{ secrets.APPLE_NOTARIZATION_API_KEY_P8 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}-unsigned
          path: out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/

      - name: notarize
        run: raxis/release/scripts/notarize.sh out/raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}/bin

      - name: tarball
        run: |
          tar -C out -czf raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}.tar.gz \
              raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}
          path: raxis-${{ env.RAXIS_VERSION }}-darwin-${{ matrix.arch }}.tar.gz

  # ────────────────────────────────────────────────────────────
  # Stage 4 — collect every artefact, compute sha256s, render
  # formulas, upload to GitHub Releases, force-push the tap.
  # ────────────────────────────────────────────────────────────
  publish:
    name:    publish release
    needs:   [build-linux, notarize]
    runs-on: ubuntu-22.04
    env:
      HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/raxis-${{ env.RAXIS_VERSION }}-linux-x86_64/raxis-${{ env.RAXIS_VERSION }}-linux-x86_64.tar.gz
            artifacts/raxis-${{ env.RAXIS_VERSION }}-linux-arm64/raxis-${{ env.RAXIS_VERSION }}-linux-arm64.tar.gz
            artifacts/raxis-${{ env.RAXIS_VERSION }}-darwin-arm64/raxis-${{ env.RAXIS_VERSION }}-darwin-arm64.tar.gz
            artifacts/raxis-${{ env.RAXIS_VERSION }}-darwin-x86_64/raxis-${{ env.RAXIS_VERSION }}-darwin-x86_64.tar.gz

      # Tap update lives in a follow-up iteration once the canonical-
      # image archives are wired and the URL/sha256 substitution
      # surface is finalised. Until then publishing a release is
      # itself sufficient — operators can `curl` the tarballs
      # directly from the release page.
      #
      # TODO(release-and-distribution.md §5.5):
      #   1. compute sha256 of every uploaded tarball
      #   2. set RAXIS_*_URL + RAXIS_*_SHA256 env vars
      #   3. invoke raxis/release/scripts/render-formula.sh per formula
      #   4. checkout chika5105/homebrew-tap via HOMEBREW_TAP_DEPLOY_KEY
      #   5. force-push the rendered Formula/raxis-*.rb files
