# PR + main reproducibility / build check.
#
# Normative reference: raxis/specs/v2/release-and-distribution.md §5.1
# ("Trigger model"). This workflow runs on every PR and every push
# to main and explicitly does NOT have access to release secrets —
# the kernel signing key, the Apple Developer ID, and the GPG key
# are all unavailable here. A contributor sending a PR therefore
# cannot cause anything signed-by-RAXIS to be produced.
#
# What the job does today:
#
#   1. cargo check --workspace --all-targets    (compile every crate)
#   2. cargo test  --workspace --all-targets    (unit + integration tests)
#   3. cargo xtask spec-graph --strict          (cross-spec consistency, gating)
#   4. cargo xtask license-check --strict       (SSPL-1.0 enforcement)
#
# What the job WILL do once the canonical-image-build pipeline is
# fully wired (the mkfs.erofs side):
#
#   5. Build the three canonical-image archives twice and assert
#      byte-equality between runs (reproducibility check).
#
# Item 5 is currently a TODO (see release-and-distribution.md §11
# implementation roadmap) and is intentionally omitted here rather
# than landing as a stub-that-passes — false-positive reproducibility
# evidence is worse than no evidence.

name: build-images

on:
  pull_request:
  push:
    branches: [main]

# Cancel older in-flight runs on the same PR so a force-push doesn't
# pile up redundant pending builds.
concurrency:
  group:               build-images-${{ github.ref }}
  cancel-in-progress:  true

# No release secrets are made available to this workflow. The
# release pipeline (release.yml) inherits its own permissions
# explicitly; everything here runs on the GitHub-Actions-default
# read-only token.
permissions:
  contents: read

jobs:
  detect-ui-changes:
    name: detect UI build inputs
    runs-on: ubuntu-22.04
    outputs:
      dashboard_fe: ${{ steps.detect.outputs.dashboard_fe }}
      raxis_site:   ${{ steps.detect.outputs.raxis_site }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: detect changed UI inputs
        id:   detect
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          head="${{ github.sha }}"
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            files="$(git ls-tree -r --name-only "$head")"
          else
            files="$(git diff --name-only "$base" "$head")"
          fi

          dashboard_fe=false
          raxis_site=false
          if [ -z "$files" ]; then
            dashboard_fe=true
            raxis_site=true
          fi
          if grep -Eq '^(\.github/workflows/build-images\.yml|raxis/dashboard-fe/)' <<<"$files"; then
            dashboard_fe=true
          fi
          if grep -Eq '^(\.github/workflows/build-images\.yml|README\.md|raxis/README\.md|raxis/guides/|raxis/specs/|raxis-site/)' <<<"$files"; then
            raxis_site=true
          fi

          echo "dashboard_fe=$dashboard_fe" >> "$GITHUB_OUTPUT"
          echo "raxis_site=$raxis_site" >> "$GITHUB_OUTPUT"
          printf 'Changed UI inputs:\n%s\n' "$files"

  dashboard-fe-build:
    name:  dashboard-fe build
    runs-on: ubuntu-22.04
    needs: detect-ui-changes
    steps:
      - name: skip unchanged dashboard frontend
        if:   needs.detect-ui-changes.outputs.dashboard_fe != 'true'
        run:  echo "dashboard-fe inputs unchanged; build check skipped."

      - uses: actions/checkout@v4
        if:   needs.detect-ui-changes.outputs.dashboard_fe == 'true'

      - name: setup node
        if:   needs.detect-ui-changes.outputs.dashboard_fe == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: raxis/dashboard-fe/package-lock.json

      - name: npm ci
        if:   needs.detect-ui-changes.outputs.dashboard_fe == 'true'
        run:  npm ci
        working-directory: raxis/dashboard-fe

      - name: npm run build
        if:   needs.detect-ui-changes.outputs.dashboard_fe == 'true'
        run:  npm run build
        working-directory: raxis/dashboard-fe

  raxis-site-build:
    name:  raxis-site build
    runs-on: ubuntu-22.04
    needs: detect-ui-changes
    steps:
      - name: skip unchanged raxis-site
        if:   needs.detect-ui-changes.outputs.raxis_site != 'true'
        run:  echo "raxis-site inputs unchanged; build check skipped."

      - uses: actions/checkout@v4
        if:   needs.detect-ui-changes.outputs.raxis_site == 'true'

      - name: setup node
        if:   needs.detect-ui-changes.outputs.raxis_site == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: raxis-site/package-lock.json

      - name: npm ci
        if:   needs.detect-ui-changes.outputs.raxis_site == 'true'
        run:  npm ci
        working-directory: raxis-site

      - name: npm run build
        if:   needs.detect-ui-changes.outputs.raxis_site == 'true'
        run:  npm run build
        working-directory: raxis-site

  workspace-check:
    name:    cargo check + test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, macos-14]
    defaults:
      run:
        working-directory: raxis
    env:
      FIRECRACKER_VERSION: v1.15.1
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: raxis -> target

      # Build everything before any test. cargo check alone is
      # cheaper but does not surface link-time issues (e.g. a
      # missing C dep on Linux) which we want to see at PR time.
      - name: cargo build (workspace)
        run: cargo build --workspace --all-targets

      # Explicit verifier-no-secrets build (FOLLOWUP-D /
      # INV-WITNESS-VERIFIER-LIVE-E2E-EXERCISED-01). The workspace
      # build above already covers this binary, but pinning a
      # named step here means a future narrowing of the
      # workspace-build step (e.g. switching to a focused
      # `cargo build -p raxis-gateway`) cannot silently drop the
      # iter63 recheck-clear coverage that depends on the binary
      # being present in `target/<profile>/`.
      - name: cargo build raxis-verifier-no-secrets (live-e2e prerequisite)
        run: cargo build -p raxis-verifier-no-secrets --release

      # GitHub Actions Ubuntu runners can expose KVM, but the runner
      # user and modules are not consistently prepared. Make the
      # Firecracker substrate prerequisites explicit before the
      # workspace test pass so a future live-gated test fails with a
      # clear host-preflight diagnostic instead of a late spawn error.
      - name: prepare Firecracker substrate (Linux)
        if:   runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y e2fsprogs curl ca-certificates
          sudo modprobe kvm || true
          sudo modprobe vhost_vsock || true
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
          fi
          arch="$(uname -m)"
          case "$arch" in
            x86_64) fc_arch="x86_64" ;;
            aarch64|arm64) fc_arch="aarch64" ;;
            *) echo "::error::unsupported Firecracker CI architecture: $arch" >&2; exit 1 ;;
          esac
          extract_dir="$(mktemp -d)"
          curl -fsSL \
            "https://github.com/firecracker-microvm/firecracker/releases/download/${FIRECRACKER_VERSION}/firecracker-${FIRECRACKER_VERSION}-${fc_arch}.tgz" \
            -o /tmp/firecracker.tgz
          tar -xzf /tmp/firecracker.tgz -C "$extract_dir"
          fc_bin="$(find "$extract_dir" -type f -name "firecracker-${FIRECRACKER_VERSION}-${fc_arch}" -print -quit)"
          if [ -z "$fc_bin" ]; then
            echo "::error::firecracker binary not found in release archive" >&2
            find "$extract_dir" -maxdepth 4 -type f -name 'firecracker*' -print >&2
            exit 1
          fi
          sudo install -m 0755 "$fc_bin" /usr/local/bin/firecracker
          firecracker --version

      - name: Firecracker substrate preflight (Linux)
        if:   runner.os == 'Linux'
        run: |
          set +e
          cargo xtask linux-prereqs --json
          status=$?
          set -e
          if [ "$status" -eq 2 ]; then
            echo "::error::Linux Firecracker substrate prereq failure" >&2
            exit 2
          fi
          exit 0

      - name: AVF entitlement preflight (macOS)
        if:   runner.os == 'macOS'
        run: |
          set -euo pipefail
          cargo xtask dev-codesign --profile debug
          /usr/bin/codesign --verify --verbose=2 target/debug/raxis-kernel
          /usr/bin/codesign -d --entitlements :- target/debug/raxis-kernel \
            >/tmp/raxis-kernel.entitlements.plist \
            2>/tmp/raxis-kernel.codesign.log
          grep -q 'com.apple.security.virtualization' /tmp/raxis-kernel.entitlements.plist

      - name: cargo test (workspace)
        run: cargo test  --workspace --all-targets

      # Spec-graph + license check run on Linux only — they are
      # platform-independent text-corpus walks and double-running
      # them on macOS adds 60s for no incremental signal. Both run
      # in strict mode: any finding fails the job and blocks merge.
      - name: spec-graph (strict)
        if:   matrix.runner == 'ubuntu-22.04'
        run:  cargo xtask spec-graph --strict

      - name: license-check (strict)
        if:   matrix.runner == 'ubuntu-22.04'
        run:  cargo xtask license-check --strict
