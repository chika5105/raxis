# Spec-graph cross-spec consistency lint.
#
# Normative reference: raxis/specs/v2/v2-deep-spec.md §Spec-Graph Lint.
#
# Runs `cargo xtask spec-graph --strict` on every PR that touches a
# spec file or the lint itself, and on every push to main. Strict
# mode means the job exits non-zero on any finding; merge to main is
# blocked until the spec graph is internally consistent.
#
# The corpus baseline was cleaned up across two passes (cross-ref
# annotation extension + canonical-home assignments). New findings
# are kept fresh by this lint plus the additional gates wired into
# the `build-images.yml` PR check.

name: spec-graph

on:
  pull_request:
    paths:
      - 'raxis/specs/**'
      - 'raxis/xtask/**'
      - '.github/workflows/spec-graph.yml'
  push:
    branches: [main]
    paths:
      - 'raxis/specs/**'
      - 'raxis/xtask/**'
      - '.github/workflows/spec-graph.yml'

jobs:
  spec-graph:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: raxis
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: raxis -> target
      # Strict mode: any spec-graph finding (duplicate failure
      # code, duplicate audit kind, dangling section ref, etc.)
      # fails the job and blocks the merge.
      - run: cargo xtask spec-graph --strict
